<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>粉贝书签 · 粉色导航站</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🌸 粉贝书签</h1>
        <p>收藏每一份心动 · 你的粉甜导航站</p>
    </div>

    <div class="add-panel">
        <div class="input-group">
            <label>📖 网站标题</label>
            <input type="text" id="titleInput" placeholder="例如：粉色博物馆" maxlength="80">
        </div>
        <div class="input-group">
            <label>🔗 网址链接</label>
            <input type="url" id="urlInput" placeholder="https:// 或 http://">
        </div>
        <button id="addBtn" class="btn btn-primary">✨ 添加书签</button>
    </div>

    <div id="bookmarksContainer" class="bookmarks-grid">
        <div class="loading">🍰 加载中，请稍后...</div>
    </div>
    <footer>💕 轻点爱心 · 永久陪伴 | 支持移动端 & 云端存储</footer>
</div>

<script src="js/app.js"></script>
</body>
</html>
