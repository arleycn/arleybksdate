<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Arley">
    <meta name="keywords" content="arley,导航,网址,书签导航"/>
    <meta name="description" content="Arley's | 书签导航">
    <title>Arley's | 书签导航</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" href="/images/bks.png" type="image/x-icon">
    <link rel="apple-touch-icon" href="/images/bks.png">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<body>
<!-- 全局加载动画 -->
<div id="globalLoader" class="global-loader">
    <div class="loader-container">
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-text">🌸 加载中...</div>
    </div>
</div>

<div class="container">
    <div class="hero">
        <h1 id="siteNameDisplay">🌸 Arley's | 书签导航</h1>
        <p id="siteDescDisplay">自用书签导航站，欢迎使用</p>
    </div>

    <div class="toolbar">
        <div class="quick-items" id="quickItemsContainer"></div>
        <div class="tool-buttons">
            <button class="tool-btn" id="themeToggle">🌙 夜间</button>
            <button class="tool-btn" id="messageBtn">💬 推荐</button>
            <button class="tool-btn" id="oldVersionBtn">📁 旧版入口</button>
            <button class="tool-btn" id="adminBtn">🔐 管理</button>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索书签..." autocomplete="off">
        <button id="searchBtn" class="btn">搜索</button>
        <button id="clearSearchBtn" class="btn" style="display:none;">清除</button>
    </div>

    <div class="category-nav-wrapper">
        <div class="category-nav" id="categoryNav"></div>
    </div>

    <div class="stats-bar" id="statsInfo">加载中...</div>
    <div id="bookmarksContainer"><div class="loading">🍰 加载中...</div></div>

    <div class="messages-section">
        <div class="messages-title">💬 网友推荐</div>
        <div id="messagesContainer"><div class="loading">加载留言中...</div></div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="footer-title">🌸 关于本站</div>
            <div class="about-text">
                <p>📖 自用收藏的书签，无任何广告行为</p>
                <p>🤝 如遇失效请留言告知，谢谢~</p>
                <button class="reward-btn" id="rewardBtn">🎁 打赏支持</button>
            </div>
            <div class="footer-section">
                <h4>👨‍💻 关于站长</h4>
                <div class="owner-info">
                    <div class="owner-card" onclick="window.open('https://blog.arley.cn/about/', '_blank')">
                        <div class="owner-avatar"><img src="images/arley.png" alt="站长头像" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23f29bb8%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2240%22%3E👤%3C/text%3E%3C/svg%3E'"></div>
                        <div class="owner-name">Arley</div>
                        <div class="owner-desc">技术博客</div>
                    </div>
                    <div class="owner-card" onclick="window.open('https://github.com/Arley', '_blank')">
                        <div class="owner-avatar"><img src="images/github.png" alt="GitHub" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22%3E%3Cpath fill=%22%23333%22 d=%22M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z%22/%3E%3C/svg%3E'"></div>
                        <div class="owner-name">GitHub</div>
                        <div class="owner-desc">@Arley</div>
                    </div>
                    <div class="owner-card" onclick="window.open('mailto:arley@arley.cn')">
                        <div class="owner-avatar"><img src="images/Email.png" alt="Email" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22%3E%3Cpath fill=%22%23333%22 d=%22M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z%22/%3E%3C/svg%3E'"></div>
                        <div class="owner-name">联系邮箱</div>
                        <div class="owner-desc">arley@arley.cn</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer-bottom" id="copyrightContainer">加载中...</div>
    </div>
</div>

<!-- 留言弹窗 -->
<div id="messageModal" class="modal">
    <div class="modal-content">
        <h3>💌 推荐网址</h3>
        <input type="text" id="msgNickname" placeholder="昵称 *" autocomplete="off">
        <textarea id="msgContent" rows="3" placeholder="推荐理由/留言内容 *"></textarea>
        <input type="text" id="msgUrl" placeholder="推荐网址 (可选)" autocomplete="off">
        <div class="modal-buttons">
            <button class="btn" id="modalClose">取消</button>
            <button class="btn btn-primary" id="modalSubmit">提交</button>
        </div>
    </div>
</div>

<!-- 打赏弹窗 -->
<div id="rewardModal" class="reward-modal">
    <div class="reward-modal-content">
        <h3>🎁 支持作者</h3>
        <div class="reward-qrcode">
            <img id="rewardQrcode" src="images/weixin.png" alt="打赏二维码">
        </div>
        <p class="reward-tip">💖 感谢您的支持！</p>
        <button class="close-reward" id="closeRewardBtn">关闭</button>
    </div>
</div>

<button class="back-to-top" id="backToTop">↑</button>

<script src="js/main.js"></script>
</body>
</html>
