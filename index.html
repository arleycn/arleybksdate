<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>粉贝书签 · 粉色导航站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ========== 主题变量 ========== */
        :root {
            --bg-gradient-start: #fff5f7;
            --bg-gradient-end: #ffe4ed;
            --card-bg: white;
            --text-primary: #5d3a4b;
            --text-secondary: #b86b84;
            --border-color: #ffe0e8;
            --btn-bg: #f8cedb;
            --btn-primary: #f29bb8;
            --shadow-color: rgba(176, 70, 100, 0.15);
            --bg-image: none;
        }

        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --card-bg: rgba(30, 30, 46, 0.95);
            --text-primary: #e8e8e8;
            --text-secondary: #c9b6d0;
            --border-color: #2a2a3e;
            --btn-bg: #2a2a3e;
            --btn-primary: #7c3a6e;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --bg-image: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', 'Roboto', sans-serif;
            padding: 1.5rem 1.2rem 3rem;
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--bg-image);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 头部区域 */
        .hero {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .hero h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #e8809e, #c95c7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        body.dark .hero h1 {
            background: linear-gradient(135deg, #d99bb8, #b86b9e);
            background-clip: text;
            -webkit-background-clip: text;
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .tool-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: var(--btn-primary);
            color: white;
            transform: translateY(-2px);
        }

        /* 搜索栏 */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 48px;
            border: 1.5px solid var(--border-color);
            background: var(--card-bg);
            font-size: 0.9rem;
            outline: none;
            color: var(--text-primary);
        }
        
        .search-input:focus {
            border-color: #f5a3bd;
            box-shadow: 0 0 0 3px rgba(245, 163, 189, 0.2);
        }
        
        .btn {
            background: var(--btn-bg);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--btn-primary);
            color: white;
        }
        
        .btn-primary:hover {
            filter: brightness(1.05);
            transform: translateY(-2px);
        }

        /* 分类导航 */
        .category-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 1.5rem;
        }
        
        .category-chip {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .category-chip:hover, .category-chip.active {
            background: var(--btn-primary);
            color: white;
        }

        /* 分类区域 */
        .category-section {
            margin-bottom: 2rem;
        }
        
        .category-header {
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
        }
        
        .category-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .category-icon {
            font-size: 1.5rem;
        }
        
        .category-title h2 {
            font-size: 1.3rem;
            color: var(--text-secondary);
            font-weight: 600;
        }
        
        .bookmark-count {
            background: var(--border-color);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        /* 书签网格 */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
        }
        
        .bookmark-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1rem;
            transition: all 0.25s;
            box-shadow: 0 8px 20px -10px var(--shadow-color);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        
        .bookmark-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -12px var(--shadow-color);
        }
        
        .bookmark-info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        
        .bookmark-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .bookmark-url {
            font-size: 0.65rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 4px;
        }
        
        .bookmark-desc {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.7;
        }
        
        .bookmark-actions {
            display: flex;
            gap: 6px;
        }
        
        .icon-btn {
            background: var(--btn-bg);
            border: none;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 30px;
            color: var(--text-secondary);
            transition: 0.15s;
        }
        
        .icon-btn:hover {
            background: var(--btn-primary);
            color: white;
        }

        /* 添加面板（仅登录后可见） */
        .add-panel {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }
        
        .add-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .add-panel-content {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 1rem;
        }
        
        .add-panel.collapsed .add-panel-content {
            display: none;
        }
        
        .input-group {
            flex: 1;
            min-width: 140px;
        }
        
        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }
        
        .input-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 30px;
            border: 1.5px solid var(--border-color);
            background: var(--card-bg);
            font-size: 0.85rem;
            outline: none;
            color: var(--text-primary);
        }
        
        .login-bar {
            text-align: right;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        
        .login-link {
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: underline;
        }

        /* 留言区域 */
        .messages-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid var(--border-color);
        }
        
        .messages-title {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .message-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .message-nickname {
            font-weight: bold;
            color: var(--btn-primary);
        }
        
        .message-content {
            margin-bottom: 0.5rem;
        }
        
        .message-url {
            font-size: 0.7rem;
        }
        
        .message-url a {
            color: var(--btn-primary);
            text-decoration: none;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border-color);
        }
        
        .modal-content h3 {
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }
        
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-primary);
        }
        
        .modal-content textarea {
            border-radius: 20px;
            resize: vertical;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* 底部信息 */
        .footer {
            margin-top: 3rem;
            padding: 2rem;
            text-align: center;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .stats-bar {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 40px;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
        
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .hero h1 { font-size: 2rem; }
            .category-title h2 { font-size: 1.1rem; }
            .add-panel-content { flex-direction: column; }
            .bookmarks-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🌸 粉贝书签</h1>
        <p>收藏每一份心动 · 你的粉甜导航站</p>
    </div>

    <div class="toolbar">
        <button class="tool-btn" id="themeToggle">🌙 夜间模式</button>
        <button class="tool-btn" id="messageBtn">💬 推荐网址</button>
    </div>

    <div class="login-bar" id="loginBar">
        <span id="loginStatus">未登录</span>
        <span class="login-link" id="loginLink"> 登录</span>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索书签...">
        <button id="searchBtn" class="btn">搜索</button>
    </div>

    <div class="category-nav" id="categoryNav"></div>

    <!-- 添加书签面板（登录后可见） -->
    <div class="add-panel" id="addPanel" style="display:none;">
        <div class="add-panel-header" id="addPanelHeader">
            <span>✨ 添加新书签</span>
            <span>▼</span>
        </div>
        <div class="add-panel-content">
            <div class="input-group">
                <label>📂 分类</label>
                <input type="text" id="categoryInput" placeholder="常用站点">
            </div>
            <div class="input-group">
                <label>📖 标题</label>
                <input type="text" id="titleInput" placeholder="网站名称">
            </div>
            <div class="input-group">
                <label>🔗 网址</label>
                <input type="text" id="urlInput" placeholder="https://">
            </div>
            <button id="addBtn" class="btn btn-primary">✨ 添加</button>
        </div>
    </div>

    <div class="stats-bar" id="statsInfo">加载中...</div>
    <div id="bookmarksContainer"><div class="loading">🍰 加载中...</div></div>

    <!-- 留言区域 -->
    <div class="messages-section">
        <div class="messages-title">💬 网友推荐</div>
        <div id="messagesContainer"><div class="loading">加载留言中...</div></div>
    </div>

    <div class="footer" id="footerInfo">
        加载中...
    </div>
</div>

<!-- 留言弹窗 -->
<div id="messageModal" class="modal">
    <div class="modal-content">
        <h3>💌 推荐网址</h3>
        <input type="text" id="msgNickname" placeholder="昵称 *">
        <textarea id="msgContent" rows="3" placeholder="推荐理由/留言内容 *"></textarea>
        <input type="text" id="msgUrl" placeholder="推荐网址 (可选)">
        <div class="modal-buttons">
            <button class="btn" id="modalClose">取消</button>
            <button class="btn btn-primary" id="modalSubmit">提交</button>
        </div>
    </div>
</div>

<!-- 登录弹窗 -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>🔐 管理员登录</h3>
        <input type="password" id="loginPassword" placeholder="管理密码">
        <div class="modal-buttons">
            <button class="btn" id="loginModalClose">取消</button>
            <button class="btn btn-primary" id="loginSubmit">登录</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://bookmarksdate.arley.workers.dev";
    let fullData = { menu: [], bookmarks: [] };
    let currentCategory = "";
    let searchKeyword = "";
    let isLoggedIn = localStorage.getItem("adminToken") === "true";
    let messages = [];

    // 主题切换
    function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark");
            document.getElementById("themeToggle").textContent = "☀️ 白天模式";
        }
    }

    document.getElementById("themeToggle").addEventListener("click", () => {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        document.getElementById("themeToggle").textContent = isDark ? "☀️ 白天模式" : "🌙 夜间模式";
    });

    function showMessage(msg, isError = false) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${isError ? '#ffcccc' : '#fbd5e2'};color:#a13e5e;padding:8px 20px;border-radius:40px;font-size:0.8rem;z-index:1000;animation:fadeOut 2s ease forwards;white-space:nowrap;`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }

    function getCategoryIcon(categoryName) {
        const iconMap = {
            '热搜新闻': '🔥', '常用站点': '⭐', '字母站': '💎', '实用工具': '👍',
            '素材资源': '📷', '开发生产': '📄', '学无止境': '🎓', '系统相关': '💻',
            '在线追剧': '📺', '搜索引擎': '🔍', '壁纸下载': '🖼️', '在线改图': '🎨'
        };
        return iconMap[categoryName] || '📌';
    }

    async function fetchBookmarks() {
        try {
            const res = await fetch(`${API_BASE}/api/bookmarks`);
            const result = await res.json();
            if (result.success && result.data) {
                fullData = result.data;
            }
            if (!fullData.bookmarks) fullData.bookmarks = [];
            renderCategoryNav();
            renderBookmarks();
            updateStats();
        } catch (err) {
            console.error(err);
            document.getElementById('bookmarksContainer').innerHTML = `<div class="empty-state"><span>⚠️</span><p>连接失败，请刷新</p></div>`;
        }
    }

    function renderCategoryNav() {
        const nav = document.getElementById('categoryNav');
        const categories = fullData.bookmarks.filter(c => c.bookmarks?.length > 0).map(c => c.category);
        if (categories.length <= 1) { nav.style.display = 'none'; return; }
        nav.style.display = 'flex';
        let html = `<span class="category-chip ${!currentCategory ? 'active' : ''}" data-cat="">全部</span>`;
        categories.forEach(cat => {
            html += `<span class="category-chip ${currentCategory === cat ? 'active' : ''}" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)}</span>`;
        });
        nav.innerHTML = html;
        nav.querySelectorAll('.category-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                currentCategory = chip.getAttribute('data-cat');
                renderCategoryNav();
                renderBookmarks();
            });
        });
    }

    function renderBookmarks() {
        const container = document.getElementById('bookmarksContainer');
        let categories = fullData.bookmarks.filter(c => c.bookmarks?.length > 0);
        if (currentCategory) categories = categories.filter(c => c.category === currentCategory);
        if (searchKeyword) {
            categories = categories.map(cat => ({ ...cat, bookmarks: cat.bookmarks.filter(b => 
                b.name.toLowerCase().includes(searchKeyword.toLowerCase()) ||
                (b.desc && b.desc.toLowerCase().includes(searchKeyword.toLowerCase())) ||
                b.url.toLowerCase().includes(searchKeyword.toLowerCase())
            ) })).filter(cat => cat.bookmarks.length > 0);
        }
        if (categories.length === 0) {
            container.innerHTML = `<div class="empty-state"><span>📭</span><p>${searchKeyword ? `没有找到"${escapeHtml(searchKeyword)}"` : '暂无书签'}</p></div>`;
            return;
        }
        let html = '';
        categories.forEach(cat => {
            html += `<div class="category-section"><div class="category-header"><div class="category-title"><span class="category-icon">${getCategoryIcon(cat.category)}</span><h2>${escapeHtml(cat.category)}</h2><span class="bookmark-count">${cat.bookmarks.length}</span></div></div><div class="bookmarks-grid">`;
            cat.bookmarks.forEach((bookmark, idx) => {
                html += `<div class="bookmark-card"><div class="bookmark-info"><div class="bookmark-title">🔗 ${escapeHtml(bookmark.name)}</div><div class="bookmark-url">${escapeHtml(bookmark.url.substring(0, 50))}${bookmark.url.length > 50 ? '...' : ''}</div>${bookmark.desc ? `<div class="bookmark-desc">💬 ${escapeHtml(bookmark.desc)}</div>` : ''}</div><div class="bookmark-actions"><button class="icon-btn visit-btn" data-url="${escapeHtml(bookmark.url)}">🔗 访问</button>${isLoggedIn ? `<button class="icon-btn delete-btn" data-category="${escapeHtml(cat.category)}" data-index="${idx}">🗑️ 删除</button>` : ''}</div></div>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.visit-btn').forEach(btn => {
            btn.addEventListener('click', () => { let url = btn.dataset.url; if (!url.startsWith('http')) url = 'https://' + url; window.open(url, '_blank'); });
        });
        if (isLoggedIn) {
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async () => { if (confirm('确定删除？')) await deleteBookmark(btn.dataset.category, btn.dataset.index); });
            });
        }
    }

    async function deleteBookmark(category, index) {
        try {
            const res = await fetch(`${API_BASE}/api/bookmarks/${encodeURIComponent(category)}/${index}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + (localStorage.getItem("adminPass") || '') } });
            const result = await res.json();
            if (result.success) { showMessage('删除成功'); fetchBookmarks(); }
            else showMessage(result.error, true);
        } catch (err) { showMessage('删除失败', true); }
    }

    async function addBookmark() {
        const category = document.getElementById('categoryInput').value.trim();
        const name = document.getElementById('titleInput').value.trim();
        let url = document.getElementById('urlInput').value.trim();
        if (!category || !name || !url) { showMessage('请填写完整', true); return; }
        if (!url.startsWith('http')) url = 'https://' + url;
        try {
            const res = await fetch(`${API_BASE}/api/bookmarks`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem("adminPass") || '') },
                body: JSON.stringify({ category, name, url, desc: '' })
            });
            const result = await res.json();
            if (result.success) { showMessage('添加成功'); document.getElementById('titleInput').value = ''; document.getElementById('urlInput').value = ''; fetchBookmarks(); }
            else showMessage(result.error, true);
        } catch (err) { showMessage('添加失败', true); }
    }

    async function fetchMessages() {
        try {
            const res = await fetch(`${API_BASE}/api/messages`);
            const result = await res.json();
            if (result.success) {
                messages = result.messages.filter(m => m.status === 'approved');
                renderMessages();
            }
        } catch (err) { console.error(err); }
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if (messages.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:2rem;">暂无推荐，快来留言吧~</div>';
            return;
        }
        let html = '';
        messages.forEach(msg => {
            html += `<div class="message-card"><div class="message-header"><span class="message-nickname">${escapeHtml(msg.nickname)}</span><span>${new Date(msg.time).toLocaleDateString()}</span></div><div class="message-content">${escapeHtml(msg.content)}</div>`;
            if (msg.recommendUrl) html += `<div class="message-url">🔗 推荐: <a href="${escapeHtml(msg.recommendUrl)}" target="_blank">${escapeHtml(msg.recommendUrl)}</a></div>`;
            html += `</div>`;
        });
        container.innerHTML = html;
    }

    async function submitMessage(nickname, content, url) {
        if (!nickname || !content) { showMessage('昵称和内容不能为空', true); return false; }
        try {
            const res = await fetch(`${API_BASE}/api/messages`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, content, recommendUrl: url || '' })
            });
            const result = await res.json();
            if (result.success) { showMessage('留言成功，等待审核'); return true; }
            else showMessage(result.error, true);
            return false;
        } catch (err) { showMessage('提交失败', true); return false; }
    }

    async function fetchSiteInfo() {
        try {
            const res = await fetch(`${API_BASE}/api/siteinfo`);
            const result = await res.json();
            if (result.success && result.siteInfo) {
                document.getElementById('footerInfo').innerHTML = `© 2025 ${result.siteInfo.name || '粉贝书签'} · ${result.siteInfo.description || '一个粉色的小书签导航站'}`;
            }
        } catch (err) { document.getElementById('footerInfo').innerHTML = '© 2025 粉贝书签 · 你的粉色导航站'; }
    }

    function updateStats() {
        const total = fullData.bookmarks.reduce((sum, cat) => sum + (cat.bookmarks?.length || 0), 0);
        const catCount = fullData.bookmarks.filter(cat => cat.bookmarks?.length > 0).length;
        document.getElementById('statsInfo').innerHTML = `${catCount} 个分类 · ${total} 个书签`;
    }

    function updateLoginUI() {
        if (isLoggedIn) {
            document.getElementById('loginStatus').innerHTML = '✅ 已登录';
            document.getElementById('loginLink').innerHTML = ' 退出';
            document.getElementById('addPanel').style.display = 'block';
        } else {
            document.getElementById('loginStatus').innerHTML = '👤 游客';
            document.getElementById('loginLink').innerHTML = ' 登录';
            document.getElementById('addPanel').style.display = 'none';
        }
    }

    // 弹窗控制
    const messageModal = document.getElementById('messageModal');
    const loginModal = document.getElementById('loginModal');

    document.getElementById('messageBtn').onclick = () => messageModal.classList.add('active');
    document.getElementById('modalClose').onclick = () => messageModal.classList.remove('active');
    document.getElementById('loginLink').onclick = () => { if (isLoggedIn) { localStorage.removeItem('adminToken'); localStorage.removeItem('adminPass'); isLoggedIn = false; updateLoginUI(); showMessage('已退出'); } else { loginModal.classList.add('active'); } };
    document.getElementById('loginModalClose').onclick = () => loginModal.classList.remove('active');
    document.getElementById('loginSubmit').onclick = async () => {
        const pwd = document.getElementById('loginPassword').value;
        if (!pwd) { showMessage('请输入密码', true); return; }
        try {
            const res = await fetch(`${API_BASE}/api/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
            const result = await res.json();
            if (result.success) {
                localStorage.setItem('adminToken', 'true');
                localStorage.setItem('adminPass', pwd);
                isLoggedIn = true;
                updateLoginUI();
                loginModal.classList.remove('active');
                showMessage('登录成功');
                fetchBookmarks();
            } else { showMessage('密码错误', true); }
        } catch (err) { showMessage('登录失败', true); }
    };
    document.getElementById('modalSubmit').onclick = async () => {
        const nickname = document.getElementById('msgNickname').value.trim();
        const content = document.getElementById('msgContent').value.trim();
        const url = document.getElementById('msgUrl').value.trim();
        const success = await submitMessage(nickname, content, url);
        if (success) {
            messageModal.classList.remove('active');
            document.getElementById('msgNickname').value = '';
            document.getElementById('msgContent').value = '';
            document.getElementById('msgUrl').value = '';
        }
    };

    function searchBookmarks() {
        searchKeyword = document.getElementById('searchInput').value.trim();
        currentCategory = '';
        renderCategoryNav();
        renderBookmarks();
    }

    document.getElementById('searchBtn').onclick = searchBookmarks;
    document.getElementById('searchInput').onkeypress = (e) => { if (e.key === 'Enter') searchBookmarks(); };
    document.getElementById('addBtn').onclick = addBookmark;

    // 折叠面板
    const addPanel = document.getElementById('addPanel');
    document.getElementById('addPanelHeader').onclick = () => addPanel.classList.toggle('collapsed');

    initTheme();
    updateLoginUI();
    fetchBookmarks();
    fetchMessages();
    fetchSiteInfo();
</script>
</body>
</html>
