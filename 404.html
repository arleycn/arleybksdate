<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Arley">
    <meta name="robots" content="noindex, follow">
    <title>404 · 页面未找到 | Arley's 书签导航</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" href="/images/bks.png" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #fff5f7;
            --bg-gradient-end: #ffe4ed;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-primary: #5d3a4b;
            --text-secondary: #b86b84;
            --border-color: #ffe0e8;
            --btn-bg: #f8cedb;
            --btn-primary: #f29bb8;
            --shadow-color: rgba(176, 70, 100, 0.15);
        }

        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --card-bg: rgba(30, 30, 46, 0.75);
            --text-primary: #e8e8e8;
            --text-secondary: #c9b6d0;
            --border-color: #2a2a3e;
            --btn-bg: rgba(30, 30, 46, 0.6);
            --btn-primary: #9b59b6;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        html {
            scroll-behavior: smooth;
            height: 100%;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../images/bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.35;
            z-index: -2;
            pointer-events: none;
        }

        .error-container {
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            animation: floatIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .error-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid var(--border-color);
            padding: 2.2rem 2rem;
            text-align: center;
            box-shadow: 0 20px 35px -12px var(--shadow-color);
        }

        .error-glitch {
            font-size: 7rem;
            font-weight: 800;
            letter-spacing: 12px;
            background: linear-gradient(135deg, #f29bb8, #c95c7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: gentleWobble 3s infinite ease;
        }

        body.dark .error-glitch {
            background: linear-gradient(135deg, #d99bb8, #b86b9e);
            background-clip: text;
            -webkit-background-clip: text;
        }

        @keyframes gentleWobble {
            0%, 100% { transform: translateX(0px); }
            2%, 6% { transform: translateX(-2px); }
            4%, 8% { transform: translateX(2px); }
            10% { transform: translateX(0); }
        }

        .lost-emoji {
            font-size: 3.2rem;
            display: inline-block;
            margin-bottom: 0.5rem;
            animation: bounceSad 2s infinite;
        }

        @keyframes bounceSad {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .error-title {
            font-size: 1.7rem;
            font-weight: 600;
            margin: 0.5rem 0;
            color: var(--text-primary);
        }

        .error-message {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0.5rem auto 1.5rem;
            line-height: 1.5;
        }

        .search-suggestion {
            background: rgba(255,255,240,0.2);
            border-radius: 60px;
            padding: 0.6rem 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
            margin-bottom: 1.8rem;
            color: var(--text-secondary);
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 1.2rem 0 1rem;
        }

        .btn-404 {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-primary-404 {
            background: var(--btn-primary);
            color: white;
            border: none;
        }

        .btn-404:hover {
            transform: translateY(-2px);
            background: var(--btn-primary);
            color: white;
        }

        .fun-stats {
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 60px;
            display: inline-flex;
            gap: 16px;
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-color);
        }

        .fun-stats span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.8;
        }

        .footer-note a {
            color: var(--btn-primary);
            text-decoration: none;
        }

        .theme-toggle-icon {
            position: fixed;
            top: 18px;
            right: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }

        .back-home-icon {
            position: fixed;
            top: 18px;
            left: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .feedback-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .feedback-content {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 1.5rem;
            width: 90%;
            max-width: 360px;
            border: 1px solid var(--border-color);
            animation: modalSlideIn 0.25s ease;
            color: var(--text-primary);
        }

        .feedback-content h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .feedback-content textarea {
            width: 100%;
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--btn-bg);
            color: var(--text-primary);
            margin: 12px 0;
            resize: vertical;
            font-family: inherit;
        }

        .feedback-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .feedback-buttons button {
            background: var(--btn-bg);
            border: none;
            padding: 6px 15px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .feedback-submit {
            background: var(--btn-primary);
            color: white;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.94); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeOutMsg {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-15px); visibility: hidden; }
        }

        @media (max-width: 520px) {
            .error-card { padding: 1.6rem 1.2rem; }
            .error-glitch { font-size: 4.8rem; letter-spacing: 6px; }
            .error-title { font-size: 1.4rem; }
            .btn-404 { padding: 8px 16px; font-size: 0.75rem; }
            .fun-stats { flex-direction: column; gap: 6px; }
        }
    </style>
</head>
<body>
    <div class="theme-toggle-icon" id="themeToggle404">🌙 夜间</div>
    <a href="/" class="back-home-icon">🏠 返回导航</a>

    <div class="error-container">
        <div class="error-card">
            <div class="lost-emoji">🌸🔍</div>
            <div class="error-glitch">404</div>
            <div class="error-title">哎呀！书签飘走啦~</div>
            <div class="error-message">
                您访问的页面似乎迷失在樱花林中<br>
                或许它被移除了，或者链接里有小调皮~
            </div>
            
            <div class="search-suggestion">
                <span>🔎</span> 试试返回首页搜索书签名，或从分类里寻找宝藏吧
            </div>

            <div class="action-buttons">
                <a href="/" class="btn-404 btn-primary-404">🌸 返回书签花园</a>
                <button class="btn-404" id="randomBookmarkSuggestion">🎲 随机推荐</button>
                <button class="btn-404" id="reportIssueBtn">📢 反馈失效链接</button>
            </div>

            <div class="fun-stats" id="funStats">
                <span>📚 加载中...</span>
                <span>🌸 加载中...</span>
                <span>💡 404治愈率: 100%</span>
            </div>
        </div>
        <div class="footer-note">
            🧭 或许您想到达 <strong>Arley's 书签导航</strong> 主站？<br>
            <a href="/">点击这里返回首页</a> 继续冲浪 🌊
        </div>
    </div>

    <div id="feedbackModal" class="feedback-modal">
        <div class="feedback-content">
            <h3>📢 告知站长链接失效</h3>
            <p style="font-size:0.8rem; margin-bottom:8px;">失效页面：<strong id="brokenUrlPath"></strong></p>
            <textarea id="feedbackMsg" rows="2" placeholder="可选：补充说明或建议..."></textarea>
            <div class="feedback-buttons">
                <button class="feedback-cancel">取消</button>
                <button class="feedback-submit">📮 发送反馈</button>
            </div>
        </div>
    </div>

    <div style="position:fixed; bottom:15px; right:15px; opacity:0.2; pointer-events:none;">🍃</div>

    <script>
        const API_BASE = "https://arleybks.arley.cn";
        
        // 获取动态书签总数
        async function fetchBookmarkCount() {
            try {
                const res = await fetch(`${API_BASE}/api/bookmarks`);
                const result = await res.json();
                if (result.success && result.data) {
                    let totalCount = 0;
                    const bookmarks = result.data.bookmarks || [];
                    bookmarks.forEach(cat => {
                        if (cat.subcategories && cat.subcategories.length > 0) {
                            cat.subcategories.forEach(sub => {
                                totalCount += (sub.bookmarks || []).length;
                            });
                        } else if (cat.bookmarks && cat.bookmarks.length > 0) {
                            totalCount += cat.bookmarks.length;
                        }
                    });
                    return totalCount;
                }
                return "∞";
            } catch (err) {
                console.error("获取书签数失败:", err);
                return "∞";
            }
        }

        // 获取404统计
        async function fetch404Stats() {
            try {
                const res = await fetch(`${API_BASE}/api/404stats`);
                const result = await res.json();
                if (result.success && result.stats) {
                    return {
                        today404: result.stats.today404 || 0,
                        total404: result.stats.total404 || 0
                    };
                }
                return { today404: 0, total404: 0 };
            } catch (err) {
                console.error("获取404统计失败:", err);
                return { today404: 0, total404: 0 };
            }
        }

        // 更新统计显示
        async function updateStats() {
            const [bookmarkCount, stats404] = await Promise.all([
                fetchBookmarkCount(),
                fetch404Stats()
            ]);
            
            const statsHtml = `
                <span>📚 今日失踪页面: ${stats404.today404}</span>
                <span>🌸 樱花书签总数: ${bookmarkCount}</span>
                <span>💡 404治愈率: 100%</span>
            `;
            document.getElementById('funStats').innerHTML = statsHtml;
        }

        // 提交404反馈
        async function submit404Feedback(brokenUrl, message) {
            try {
                const res = await fetch(`${API_BASE}/api/404feedback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        brokenUrl: brokenUrl,
                        message: message,
                        userAgent: navigator.userAgent,
                        referer: document.referrer
                    })
                });
                const result = await res.json();
                if (result.success) {
                    showMessage('📨 反馈已记录！感谢您的帮助～', false);
                    // 更新统计
                    updateStats();
                    return true;
                } else {
                    showMessage(result.error || '提交失败', true);
                    return false;
                }
            } catch (err) {
                showMessage('网络错误，请稍后重试', true);
                return false;
            }
        }

        function showMessage(msg, isError) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:${isError ? '#c0392b' : '#27ae60'};color:white;padding:6px 18px;border-radius:40px;font-size:0.75rem;z-index:2000;animation:fadeOutMsg 2.5s forwards;box-shadow:0 2px 8px rgba(0,0,0,0.2);`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // 随机推荐
        const recommendations = [
            { name: "GitHub 开源世界", url: "https://github.com" },
            { name: "Cloudflare 加速星球", url: "https://cloudflare.com" },
            { name: "Canva 设计魔法", url: "https://canva.com" },
            { name: "V2EX 创意社区", url: "https://v2ex.com" },
            { name: "MDN 学前端", url: "https://developer.mozilla.org" },
            { name: "Arley 技术博客", url: "https://blog.arley.cn" }
        ];

        document.getElementById('randomBookmarkSuggestion')?.addEventListener('click', () => {
            const rec = recommendations[Math.floor(Math.random() * recommendations.length)];
            showMessage(`✨ 推荐前往：${rec.name}`, false);
            setTimeout(() => window.open(rec.url, '_blank'), 400);
        });

        // 反馈弹窗
        const modal = document.getElementById('feedbackModal');
        const brokenUrlSpan = document.getElementById('brokenUrlPath');
        brokenUrlSpan.innerText = window.location.href;

        document.getElementById('reportIssueBtn')?.addEventListener('click', () => {
            if (modal) modal.style.display = 'flex';
        });

        document.querySelector('.feedback-cancel')?.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        modal?.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });

        document.querySelector('.feedback-submit')?.addEventListener('click', async () => {
            const msg = document.getElementById('feedbackMsg')?.value.trim() || '';
            const success = await submit404Feedback(window.location.href, msg);
            if (success) {
                modal.style.display = 'none';
                document.getElementById('feedbackMsg').value = '';
            }
        });

        // 主题切换
        function initTheme() {
            const saved = localStorage.getItem("theme");
            const themeToggle = document.getElementById('themeToggle404');
            if (saved === "dark") {
                document.body.classList.add("dark");
                if (themeToggle) themeToggle.textContent = "☀️ 白天";
            }
        }
        
        document.getElementById('themeToggle404')?.addEventListener('click', () => {
            document.body.classList.toggle("dark");
            const isDark = document.body.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            const btn = document.getElementById('themeToggle404');
            if (btn) btn.textContent = isDark ? "☀️ 白天" : "🌙 夜间";
        });
        
        initTheme();
        updateStats();

        // 控制台彩蛋
        console.log("%c 404 · 樱花迷失之境 %c 反馈已连接数据库 ", "color: #ffffff; background: #d2136b; border-radius: 5px; padding:5px;", "padding:5px; background:#f29bb8; color:white;");
    </script>
</body>
</html>
