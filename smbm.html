<script>
    const WORKER_URL = 'https://sm.arley.cn';
    
    const STORAGE_KEY = 'nav_unlocked';

    // ---------- API и°ғз”Ё ----------
    async function apiCall(endpoint, options = {}) {
        const response = await fetch(`${WORKER_URL}${endpoint}`, {
            ...options,
            headers: { 'Content-Type': 'application/json', ...options.headers }
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
            throw new Error(data.error || `HTTP ${response.status}`);
        }
        return data;
    }

    async function checkPasswordExists() {
        const result = await apiCall('/check-password');
        return result.hasPassword;
    }

    async function setupPassword(password) {
        await apiCall('/setup', { method: 'POST', body: JSON.stringify({ password }) });
    }

    async function verifyPassword(password) {
        const result = await apiCall('/verify', { method: 'POST', body: JSON.stringify({ password }) });
        return result.success;
    }

    async function loadBookmarks() {
        const result = await apiCall('/bookmarks');
        return result.bookmarks || [];
    }

    async function addBookmark(name, url, icon) {
        const result = await apiCall('/bookmarks', { method: 'POST', body: JSON.stringify({ name, url, icon }) });
        return result.bookmark;
    }

    async function deleteBookmark(id) {
        await apiCall('/bookmarks', { method: 'DELETE', body: JSON.stringify({ id }) });
    }

    async function changePassword(newPassword) {
        await apiCall('/password', { method: 'POST', body: JSON.stringify({ newPassword }) });
    }

    let currentBookmarks = [];

    function renderBookmarks() {
        const grid = document.getElementById('bookmarkGrid');
        if (!grid) return;
        if (currentBookmarks.length === 0) {
            grid.innerHTML = '<div style="color:#b34e7a; padding:1rem;">вңЁ жҡӮж— д№ҰзӯҫпјҢзӮ№еҮ»дёҠж–№ж·»еҠ пҪһ</div>';
            return;
        }
        grid.innerHTML = '';
        currentBookmarks.forEach(b => {
            const link = document.createElement('a');
            link.className = 'bookmark-card';
            link.href = b.url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.innerHTML = `${b.icon || 'рҹ”–'} ${escapeHtml(b.name)} <span class="delete-btn" data-id="${b.id}">рҹ’”</span>`;
            link.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-btn')) {
                    e.preventDefault();
                    handleDelete(b.id);
                }
            });
            grid.appendChild(link);
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function handleDelete(id) {
        if (!confirm('зЎ®е®ҡз§»йҷӨиҝҷдёӘд№Ұзӯҫеҗ—пјҹ')) return;
        await deleteBookmark(id);
        currentBookmarks = await loadBookmarks();
        renderBookmarks();
    }

    function showAddModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>рҹҢё ж·»еҠ ж–°д№Ұзӯҫ</h3>
                <input type="text" id="modalName" placeholder="зҪ‘з«ҷеҗҚз§°" autocomplete="off">
                <input type="url" id="modalUrl" placeholder="зҪ‘еқҖ (https://...)" autocomplete="off">
                <input type="text" id="modalIcon" placeholder="еӣҫж Ү emoji (й»ҳи®Өрҹ”–)" maxlength="4">
                <div class="modal-buttons">
                    <button id="modalConfirm">ж·»еҠ </button>
                    <button id="modalCancel">еҸ–ж¶Ҳ</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const confirmBtn = document.getElementById('modalConfirm');
        const cancelBtn = document.getElementById('modalCancel');
        const nameInp = document.getElementById('modalName');
        const urlInp = document.getElementById('modalUrl');
        const iconInp = document.getElementById('modalIcon');
        const close = () => modal.remove();

        confirmBtn.onclick = async () => {
            const name = nameInp.value.trim();
            const url = urlInp.value.trim();
            const icon = iconInp.value.trim() || 'рҹ”–';
            if (!name || !url) { alert('иҜ·еЎ«еҶҷе®Ңж•ҙдҝЎжҒҜ'); return; }
            if (!url.startsWith('http')) { alert('зҪ‘еқҖйңҖд»Ҙ http:// жҲ– https:// ејҖеӨҙ'); return; }
            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<span class="loading"></span>ж·»еҠ дёӯ';
            await addBookmark(name, url, icon);
            currentBookmarks = await loadBookmarks();
            renderBookmarks();
            close();
        };
        cancelBtn.onclick = close;
    }

    function showChangePasswordModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>рҹҺҖ дҝ®ж”№еҜҶз Ғ</h3>
                <input type="password" id="newPwd1" placeholder="ж–°еҜҶз Ғ (иҮіе°‘4дҪҚ)" autocomplete="off">
                <input type="password" id="newPwd2" placeholder="зЎ®и®Өж–°еҜҶз Ғ" autocomplete="off">
                <div id="modalMsg" class="error" style="margin-top:6px;"></div>
                <div class="modal-buttons">
                    <button id="modalConfirm">зЎ®и®Өдҝ®ж”№</button>
                    <button id="modalCancel">еҸ–ж¶Ҳ</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const confirmBtn = document.getElementById('modalConfirm');
        const cancelBtn = document.getElementById('modalCancel');
        const pwd1 = document.getElementById('newPwd1');
        const pwd2 = document.getElementById('newPwd2');
        const msgDiv = document.getElementById('modalMsg');
        const close = () => modal.remove();

        confirmBtn.onclick = async () => {
            const newPwd = pwd1.value;
            const confirmPwd = pwd2.value;
            if (!newPwd || newPwd.length < 4) { msgDiv.innerText = 'еҜҶз ҒиҮіе°‘4дҪҚ'; return; }
            if (newPwd !== confirmPwd) { msgDiv.innerText = 'дёӨж¬ЎеҜҶз ҒдёҚдёҖиҮҙ'; return; }
            msgDiv.innerText = '';
            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<span class="loading"></span>дҝ®ж”№дёӯ';
            await changePassword(newPwd);
            alert('вң… еҜҶз Ғе·Іжӣҙж–°пјҢиҜ·йҮҚж–°зҷ»еҪ•');
            close();
            logout();
        };
        cancelBtn.onclick = close;
    }

    function logout() {
        sessionStorage.removeItem(STORAGE_KEY);
        document.getElementById('lockScreen').style.display = 'flex';
        document.getElementById('mainContent').style.display = 'none';
        currentBookmarks = [];
        // йҮҚж–°еҲқе§ӢеҢ–пјҢжҳҫзӨәзҷ»еҪ•з•Ңйқў
        showLoginUI();
    }

    function backToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showLoginUI() {
        const card = document.getElementById('lockCard');
        card.innerHTML = `
            <h2>рҹ”җ з§ҒеҜҶиҠұеӣӯ</h2>
            <p>иҫ“е…ҘеҜҶз Ғ В· иҪ»еҗҜд№Ұзӯҫ</p>
            <input type="password" id="loginPassword" placeholder="еҜҶз Ғ" autocomplete="off">
            <button id="loginBtn">и§Јй”ҒжўҰеўғ</button>
            <div id="message" class="error"></div>
        `;
        document.getElementById('loginBtn').onclick = async () => {
            const pwd = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('message');
            if (!pwd) { msgDiv.innerText = 'иҜ·иҫ“е…ҘеҜҶз Ғ'; return; }
            msgDiv.innerText = '';
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>йӘҢиҜҒдёӯ';
            try {
                const valid = await verifyPassword(pwd);
                if (valid) {
                    sessionStorage.setItem(STORAGE_KEY, 'true');
                    currentBookmarks = await loadBookmarks();
                    renderBookmarks();
                    document.getElementById('lockScreen').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                } else {
                    msgDiv.innerText = 'еҜҶз Ғй”ҷиҜҜпјҢеҶҚиҜ•иҜ•еҗ§пҪһ';
                }
            } catch (err) {
                msgDiv.innerText = 'иҝһжҺҘеӨұиҙҘ: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'и§Јй”ҒжўҰеўғ';
            }
        };
        const inputEl = document.getElementById('loginPassword');
        inputEl.onkeypress = (e) => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); };
    }

    function showSetupUI() {
        const card = document.getElementById('lockCard');
        card.innerHTML = `
            <h2>рҹҢё еҲқж¬Ўи§Ғйқў</h2>
            <p>и®ҫзҪ®дҪ зҡ„дё“еұһеҜҶз Ғ (вүҘ4дҪҚ)</p>
            <input type="password" id="setupPassword1" placeholder="иҫ“е…ҘеҜҶз Ғ" autocomplete="off">
            <input type="password" id="setupPassword2" placeholder="зЎ®и®ӨеҜҶз Ғ" autocomplete="off">
            <button id="setupBtn">ејҖеҗҜз§ҒеҜҶеҜјиҲӘ</button>
            <div id="message" class="error"></div>
        `;
        document.getElementById('setupBtn').onclick = async () => {
            const p1 = document.getElementById('setupPassword1').value;
            const p2 = document.getElementById('setupPassword2').value;
            const msgDiv = document.getElementById('message');
            if (!p1 || p1.length < 4) { msgDiv.innerText = 'еҜҶз ҒиҮіе°‘4дҪҚ'; return; }
            if (p1 !== p2) { msgDiv.innerText = 'дёӨж¬ЎеҜҶз ҒдёҚдёҖиҮҙ'; return; }
            msgDiv.innerText = '';
            const btn = document.getElementById('setupBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>еҲӣе»әдёӯ';
            await setupPassword(p1);
            msgDiv.className = 'success';
            msgDiv.innerText = 'вң… еҜҶз Ғи®ҫзҪ®жҲҗеҠҹпјҒйҮҚж–°зҷ»еҪ•еҗ§';
            sessionStorage.removeItem(STORAGE_KEY);
            setTimeout(() => { showLoginUI(); }, 1300);
        };
    }

    async function init() {
        try {
            const isUnlocked = sessionStorage.getItem(STORAGE_KEY);
            
            if (isUnlocked === 'true') {
                currentBookmarks = await loadBookmarks();
                renderBookmarks();
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                document.getElementById('lockScreen').style.display = 'flex';
                const hasPwd = await checkPasswordExists();
                if (hasPwd) showLoginUI();
                else showSetupUI();
            }
        } catch (err) {
            document.getElementById('lockScreen').style.display = 'flex';
            const card = document.getElementById('lockCard');
            card.innerHTML = `
                <h2>вҡ пёҸ иҝһжҺҘејӮеёё</h2>
                <p>иҜ·жЈҖжҹҘ Worker ең°еқҖжҲ– Upstash й…ҚзҪ®</p>
                <div class="error">${err.message}</div>
                <button onclick="location.reload()" style="margin-top:1rem;">йҮҚиҜ•</button>
            `;
        }
    }

    function bindGlobalEvents() {
        const changeBtn = document.getElementById('changePwdBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const backBtn = document.getElementById('backToTop');
        const add = document.getElementById('addBtn');
        if (changeBtn) changeBtn.addEventListener('click', showChangePasswordModal);
        if (logoutBtn) logoutBtn.addEventListener('click', logout);
        if (backBtn) backBtn.addEventListener('click', backToTop);
        if (add) add.addEventListener('click', showAddModal);
    }

    const observer = new MutationObserver(() => {
        if (document.getElementById('mainContent').style.display === 'block') {
            bindGlobalEvents();
        }
    });
    observer.observe(document.getElementById('mainContent'), { attributes: true, attributeFilter: ['style'] });

    init();
    setTimeout(() => bindGlobalEvents(), 200);
</script>
</body>
</html>
