<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粉贝书签 · 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
            min-height: 100vh;
            color: #e8e8e8;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 2rem; color: #d99bb8; }
        h2 { color: #c9b6d0; margin: 1.5rem 0 1rem; font-size: 1.2rem; }
        
        .logout-btn {
            position: fixed; top: 20px; right: 20px;
            background: #2a2a3e; padding: 8px 20px; border-radius: 30px;
            cursor: pointer; border: 1px solid #9b59b6;
        }
        .logout-btn:hover { background: #9b59b6; }
        
        .card { background: rgba(30, 30, 46, 0.95); border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid #2a2a3e; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #c9b6d0; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px 16px; border-radius: 30px;
            border: 1px solid #2a2a3e; background: #1a1a2e; color: #e8e8e8;
        }
        .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; }
        
        .btn {
            padding: 10px 24px; border-radius: 30px; border: none;
            cursor: pointer; background: #2a2a3e; color: #e8e8e8; transition: all 0.2s;
        }
        .btn-primary { background: #9b59b6; color: white; }
        .btn-danger { background: #c0392b; color: white; }
        .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        .message-item {
            background: #1a1a2e; border-radius: 16px; padding: 1rem;
            margin-bottom: 1rem; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 1rem;
        }
        .message-info { flex: 1; }
        .message-nickname { font-weight: bold; color: #d99bb8; }
        .message-time { font-size: 0.7rem; color: #888; margin-left: 1rem; }
        .message-content { margin-top: 0.5rem; }
        .status-badge {
            font-size: 0.7rem; padding: 2px 10px; border-radius: 20px; margin-left: 1rem;
        }
        .status-pending { background: #f39c12; color: #333; }
        .status-approved { background: #27ae60; color: white; }
        
        .bookmark-table { width: 100%; border-collapse: collapse; }
        .bookmark-table th, .bookmark-table td { padding: 10px; text-align: left; border-bottom: 1px solid #2a2a3e; }
        .bookmark-table tr:hover { background: #2a2a3e; }
        
        .empty { text-align: center; padding: 3rem; color: #888; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        .tab {
            padding: 10px 24px; background: #2a2a3e; border-radius: 30px; cursor: pointer;
        }
        .tab.active { background: #9b59b6; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
<div class="container">
    <h1>🌸 粉贝书签 · 管理后台</h1>
    
    <div class="tabs">
        <div class="tab active" data-tab="bookmarks">📚 书签管理</div>
        <div class="tab" data-tab="messages">💬 留言管理</div>
        <div class="tab" data-tab="settings">⚙️ 网站设置</div>
    </div>
    
    <!-- 书签管理 -->
    <div id="tab-bookmarks" class="tab-content active">
        <div class="card">
            <h2>➕ 添加书签</h2>
            <div class="form-row">
                <div class="form-group"><label>分类</label><input type="text" id="newCategory" placeholder="如: 常用站点"></div>
                <div class="form-group"><label>标题</label><input type="text" id="newName" placeholder="网站名称"></div>
                <div class="form-group"><label>网址</label><input type="text" id="newUrl" placeholder="https://"></div>
                <div class="form-group"><label>描述</label><input type="text" id="newDesc" placeholder="可选"></div>
            </div>
            <button class="btn btn-primary" id="addBookmarkBtn">✨ 添加书签</button>
        </div>
        
        <div class="card">
            <h2>📖 现有书签</h2>
            <div id="bookmarksList"></div>
        </div>
    </div>
    
    <!-- 留言管理 -->
    <div id="tab-messages" class="tab-content">
        <div class="card">
            <h2>💬 留言审核</h2>
            <div id="messagesList"></div>
        </div>
    </div>
    
    <!-- 网站设置 -->
    <div id="tab-settings" class="tab-content">
        <div class="card">
            <h2>⚙️ 基本信息</h2>
            <div class="form-group"><label>网站名称</label><input type="text" id="siteName" placeholder="粉贝书签"></div>
            <div class="form-group"><label>网站描述</label><input type="text" id="siteDesc" placeholder="一个粉色的小书签导航站"></div>
            <button class="btn btn-primary" id="saveSiteInfo">💾 保存设置</button>
        </div>
    </div>
</div>
<div class="logout-btn" id="logoutBtn">🚪 退出登录</div>

<script>
    const API_BASE = "https://bookmarksdate.arley.workers.dev";
    let adminPass = localStorage.getItem("adminPass");
    
    if (!adminPass) {
        const pwd = prompt("请输入管理员密码");
        if (pwd) { localStorage.setItem("adminPass", pwd); adminPass = pwd; }
        else { location.href = "/"; }
    }
    
    const headers = { 'Authorization': `Bearer ${adminPass}`, 'Content-Type': 'application/json' };
    
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
        });
    });
    
    // 加载书签
    async function loadBookmarks() {
        try {
            const res = await fetch(`${API_BASE}/api/admin/bookmarks`, { headers: { 'Authorization': `Bearer ${adminPass}` } });
            if (res.status === 401) { logout(); return; }
            const result = await res.json();
            if (result.success) renderBookmarks(result.data.bookmarks);
        } catch (err) { console.error(err); }
    }
    
    function renderBookmarks(bookmarks) {
        const container = document.getElementById('bookmarksList');
        if (!bookmarks || bookmarks.length === 0) {
            container.innerHTML = '<div class="empty">暂无书签</div>';
            return;
        }
        let html = '<table class="bookmark-table"><thead><tr><th>分类</th><th>标题</th><th>网址</th><th>操作</th></tr></thead><tbody>';
        bookmarks.forEach(cat => {
            if (!cat.bookmarks || cat.bookmarks.length === 0) return;
            cat.bookmarks.forEach((bookmark, idx) => {
                html += `<tr><td>${escapeHtml(cat.category)}</td><td>${escapeHtml(bookmark.name)}</td><td><small>${escapeHtml(bookmark.url.substring(0, 40))}...</small></td><td><button class="btn btn-danger btn-sm" onclick="deleteBookmark('${escapeHtml(cat.category)}', ${idx})">删除</button></td></tr>`;
            });
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    window.deleteBookmark = async (category, index) => {
        if (!confirm('确定删除这个书签吗？')) return;
        try {
            const res = await fetch(`${API_BASE}/api/admin/bookmarks/${encodeURIComponent(category)}/${index}`, { method: 'DELETE', headers });
            if (res.ok) { alert('删除成功'); loadBookmarks(); }
            else alert('删除失败');
        } catch (err) { alert('删除失败'); }
    };
    
    document.getElementById('addBookmarkBtn').onclick = async () => {
        const category = document.getElementById('newCategory').value.trim();
        const name = document.getElementById('newName').value.trim();
        let url = document.getElementById('newUrl').value.trim();
        const desc = document.getElementById('newDesc').value.trim();
        if (!category || !name || !url) { alert('请填写完整'); return; }
        if (!url.startsWith('http')) url = 'https://' + url;
        try {
            const res = await fetch(`${API_BASE}/api/admin/bookmarks`, {
                method: 'POST', headers,
                body: JSON.stringify({ category, name, url, desc })
            });
            if (res.ok) {
                alert('添加成功');
                document.getElementById('newCategory').value = '';
                document.getElementById('newName').value = '';
                document.getElementById('newUrl').value = '';
                document.getElementById('newDesc').value = '';
                loadBookmarks();
            } else { alert('添加失败'); }
        } catch (err) { alert('添加失败'); }
    };
    
    // 加载留言
    async function loadMessages() {
        try {
            const res = await fetch(`${API_BASE}/api/admin/messages`, { headers: { 'Authorization': `Bearer ${adminPass}` } });
            if (res.status === 401) { logout(); return; }
            const result = await res.json();
            if (result.success) renderMessages(result.messages);
        } catch (err) { console.error(err); }
    }
    
    function renderMessages(messages) {
        const container = document.getElementById('messagesList');
        if (!messages || messages.length === 0) {
            container.innerHTML = '<div class="empty">暂无留言</div>';
            return;
        }
        let html = '';
        messages.forEach(msg => {
            html += `<div class="message-item"><div class="message-info"><span class="message-nickname">${escapeHtml(msg.nickname)}</span><span class="message-time">${new Date(msg.time).toLocaleString()}</span><span class="status-badge status-${msg.status === 'pending' ? 'pending' : 'approved'}">${msg.status === 'pending' ? '待审核' : '已通过'}</span><div class="message-content">${escapeHtml(msg.content)}</div>${msg.recommendUrl ? `<div>🔗 <a href="${escapeHtml(msg.recommendUrl)}" target="_blank">${escapeHtml(msg.recommendUrl)}</a></div>` : ''}</div><div>${msg.status === 'pending' ? `<button class="btn btn-primary btn-sm" onclick="approveMessage('${msg.id}')">✅ 通过</button> ` : ''}<button class="btn btn-danger btn-sm" onclick="deleteMessage('${msg.id}')">🗑️ 删除</button></div></div>`;
        });
        container.innerHTML = html;
    }
    
    window.approveMessage = async (id) => {
        if (!confirm('通过这条留言？')) return;
        try {
            const res = await fetch(`${API_BASE}/api/admin/messages/${id}`, {
                method: 'PUT', headers, body: JSON.stringify({ action: 'approve' })
            });
            if (res.ok) { alert('已通过'); loadMessages(); }
        } catch (err) { alert('操作失败'); }
    };
    
    window.deleteMessage = async (id) => {
        if (!confirm('确定删除这条留言？')) return;
        try {
            const res = await fetch(`${API_BASE}/api/admin/messages/${id}`, {
                method: 'PUT', headers, body: JSON.stringify({ action: 'delete' })
            });
            if (res.ok) { alert('已删除'); loadMessages(); }
        } catch (err) { alert('操作失败'); }
    };
    
    // 网站设置
    async function loadSiteInfo() {
        try {
            const res = await fetch(`${API_BASE}/api/siteinfo`);
            const result = await res.json();
            if (result.success && result.siteInfo) {
                document.getElementById('siteName').value = result.siteInfo.name || '';
                document.getElementById('siteDesc').value = result.siteInfo.description || '';
            }
        } catch (err) { console.error(err); }
    }
    
    document.getElementById('saveSiteInfo').onclick = async () => {
        const name = document.getElementById('siteName').value.trim();
        const description = document.getElementById('siteDesc').value.trim();
        try {
            const res = await fetch(`${API_BASE}/api/admin/siteinfo`, {
                method: 'PUT', headers, body: JSON.stringify({ name, description })
            });
            if (res.ok) alert('保存成功');
            else alert('保存失败');
        } catch (err) { alert('保存失败'); }
    };
    
    function logout() {
        localStorage.removeItem("adminPass");
        location.href = "/";
    }
    
    document.getElementById('logoutBtn').onclick = logout;
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    loadBookmarks();
    loadMessages();
    loadSiteInfo();
</script>
</body>
</html>
