<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理书签 | 后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-theme="light">
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-bookmark"></i> 管理后台</a>
            <a href="/" class="btn btn-outline-primary"><i class="fas fa-home"></i> 返回首页</a>
        </div>
    </nav>

    <div class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-link"></i> 所有书签</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#bookmarkModal" id="addBtn">
                <i class="fas fa-plus"></i> 新增书签
            </button>
        </div>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr><th>ID</th><th>标题</th><th>URL</th><th>分类</th><th>操作</th></tr>
                </thead>
                <tbody id="linksTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 书签编辑模态框 -->
    <div class="modal fade" id="bookmarkModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">书签信息</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="bookmarkForm">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label>标题 *</label>
                            <input type="text" id="title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>URL *</label>
                            <input type="url" id="url" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>分类</label>
                            <input type="text" id="category" class="form-control" placeholder="例如：开发工具">
                        </div>
                        <div class="mb-3">
                            <label>图标 (FontAwesome类名)</label>
                            <input type="text" id="icon" class="form-control" placeholder="fas fa-code">
                        </div>
                        <div class="mb-3">
                            <label>描述</label>
                            <textarea id="description" class="form-control" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
