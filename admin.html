<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" href="favicon.ico">
    <title>Arley's | 管理后台</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<!-- 添加主题切换按钮 -->
<div class="theme-toggle-btn" id="themeToggleBtn" style="position: fixed; top: 1rem; left: 1rem; z-index: 101;">🌙 夜间模式</div>

<div class="container">
    <h1>🌸 Arley's | 管理后台</h1>

    <div class="tabs">
        <div class="tab active" data-tab="bookmarks">📚 书签管理</div>
        <div class="tab" data-tab="messages">💬 留言管理</div>
        <div class="tab" data-tab="quicklinks">🔗 快捷链接</div>
        <div class="tab" data-tab="settings">⚙️ 网站设置</div>
        <div class="tab" data-tab="feedback404">🚫 404反馈</div>
    </div>

    <!-- 书签管理 -->
    <div id="tab-bookmarks" class="tab-content active">
        <div class="card">
            <h2>➕ 添加书签</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>📂 大分类</label>
                    <select id="newCategory">
                        <option value="热搜新闻">热搜新闻</option>
                        <option value="常用站点">常用站点</option>
                        <option value="字母站">字母站</option>
                        <option value="实用工具">实用工具</option>
                        <option value="素材资源">素材资源</option>
                        <option value="开发生产">开发生产</option>
                        <option value="学无止境">学无止境</option>
                        <option value="系统相关">系统相关</option>
                        <option value="在线追剧">在线追剧</option>
                        <option value="搜索引擎">搜索引擎</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📂 小分类（可选）</label>
                    <input type="text" id="newSubcategory" placeholder="留空则直接添加到分类下" list="newSubcategoryList">
                    <datalist id="newSubcategoryList"></datalist>
                </div>
                <div class="form-group">
                    <label>📖 标题</label>
                    <input type="text" id="newName" placeholder="网站名称">
                </div>
                <div class="form-group">
                    <label>🔗 网址</label>
                    <input type="text" id="newUrl" placeholder="https://">
                </div>
                <div class="form-group">
                    <label>💬 描述</label>
                    <input type="text" id="newDesc" placeholder="简单描述">
                </div>
            </div>
            <button class="btn btn-primary" id="addBookmarkBtn">✨ 添加书签</button>
        </div>
        <div class="card">
            <h2>📖 现有书签</h2>
            <div id="bookmarksList"><div class="empty">加载中...</div></div>
        </div>
    </div>

    <!-- 留言管理 -->
    <div id="tab-messages" class="tab-content">
        <div class="card">
            <h2>💬 留言管理</h2>
            <div id="messagesList"><div class="empty">加载中...</div></div>
        </div>
    </div>

    <!-- 快捷链接管理 -->
    <div id="tab-quicklinks" class="tab-content">
        <div class="card">
            <h2>➕ 添加快捷链接</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>🔗 链接名称</label>
                    <input type="text" id="newQuickLinkName" placeholder="例如：技术博客">
                </div>
                <div class="form-group">
                    <label>🌐 链接地址</label>
                    <input type="text" id="newQuickLinkUrl" placeholder="https://">
                </div>
            </div>
            <button class="btn btn-primary" id="addQuickLinkBtn">✨ 添加快捷链接</button>
        </div>
        <div class="card">
            <h2>🔗 现有快捷链接</h2>
            <div id="quickLinksList"><div class="empty">加载中...</div></div>
        </div>
    </div>

    <!-- 网站设置 -->
    <div id="tab-settings" class="tab-content">
        <div class="card">
            <h2>⚙️ 基本信息</h2>
            <div class="form-group">
                <label>网站名称</label>
                <input type="text" id="siteName" placeholder="Arley's | 书签导航">
            </div>
            <div class="form-group">
                <label>网站描述</label>
                <input type="text" id="siteDesc" placeholder="自用书签导航站，欢迎使用">
            </div>
            <button class="btn btn-primary" id="saveSiteInfo">💾 保存设置</button>
        </div>
        <div class="card">
            <h2>📄 版权设置</h2>
            <div class="form-group">
                <label>版权所有年份</label>
                <input type="text" id="copyrightYear" placeholder="2026">
            </div>
            <div class="form-group">
                <label>版权所有者</label>
                <input type="text" id="copyrightOwner" placeholder="ARLEY">
            </div>
            <div class="form-group">
                <label>所有者网址</label>
                <input type="text" id="copyrightUrl" placeholder="https://arley.cn">
            </div>
            <div class="form-group">
                <label>Powered by 名称</label>
                <input type="text" id="poweredName" placeholder="ArleyBKS">
            </div>
            <div class="form-group">
                <label>Powered by 网址</label>
                <input type="text" id="poweredUrl" placeholder="https://bm.arley.cn/">
            </div>
            <div class="form-group">
                <label>萌ICP备案号</label>
                <input type="text" id="icpNumber" placeholder="20222555">
            </div>
            <button class="btn btn-primary" id="saveCopyrightBtn">💾 保存版权设置</button>
        </div>
    </div>

    <!-- 404反馈管理 -->
    <div id="tab-feedback404" class="tab-content">
        <div class="card">
            <h2>🚫 404错误反馈记录</h2>
            <p style="font-size:0.75rem; color:var(--text-secondary); margin-bottom:1rem;">用户访问失效页面时提交的反馈，帮助您发现死链</p>
            <div id="feedback404List"><div class="empty">加载中...</div></div>
        </div>
    </div>
</div>

<div class="logout-btn" id="logoutBtn">🚪 退出登录</div>

<!-- 确认弹窗 -->
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <h3 id="confirmTitle">确认操作</h3>
        <p id="confirmMessage">确定要执行此操作吗？</p>
        <div class="modal-buttons">
            <button class="btn" id="confirmCancel">取消</button>
            <button class="btn btn-primary" id="confirmOk">确定</button>
        </div>
    </div>
</div>

<!-- 书签编辑弹窗 -->
<div id="editBookmarkModal" class="edit-modal">
    <div class="edit-modal-content">
        <h3 id="editModalTitle">✏️ 编辑书签</h3>
        <div class="form-group">
            <label>📂 大分类</label>
            <select id="editCategory">
                <option value="热搜新闻">热搜新闻</option>
                <option value="常用站点">常用站点</option>
                <option value="字母站">字母站</option>
                <option value="实用工具">实用工具</option>
                <option value="素材资源">素材资源</option>
                <option value="开发生产">开发生产</option>
                <option value="学无止境">学无止境</option>
                <option value="系统相关">系统相关</option>
                <option value="在线追剧">在线追剧</option>
                <option value="搜索引擎">搜索引擎</option>
            </select>
        </div>
        <div class="form-group">
            <label>📂 小分类（可选）</label>
            <input type="text" id="editSubcategory" placeholder="留空则直接添加到分类下" list="editSubcategoryList">
            <datalist id="editSubcategoryList"></datalist>
        </div>
        <div class="form-group">
            <label>📖 标题</label>
            <input type="text" id="editName" placeholder="网站名称">
        </div>
        <div class="form-group">
            <label>🔗 网址</label>
            <input type="text" id="editUrl" placeholder="https://">
        </div>
        <div class="form-group">
            <label>💬 描述</label>
            <input type="text" id="editDesc" placeholder="简单描述">
        </div>
        <div class="edit-modal-buttons">
            <button class="btn" id="closeEditModalBtn">取消</button>
            <button class="btn btn-primary" id="saveEditModalBtn">保存</button>
        </div>
    </div>
</div>

<!-- 快捷链接编辑弹窗 -->
<div id="editQuickLinkModal" class="edit-modal">
    <div class="edit-modal-content">
        <h3>✏️ 编辑快捷链接</h3>
        <div class="form-group">
            <label>🔗 链接名称</label>
            <input type="text" id="editQuickLinkName" placeholder="链接名称">
        </div>
        <div class="form-group">
            <label>🌐 链接地址</label>
            <input type="text" id="editQuickLinkUrl" placeholder="https://">
        </div>
        <div class="edit-modal-buttons">
            <button class="btn" id="closeQuickEditModalBtn">取消</button>
            <button class="btn btn-primary" id="saveQuickEditModalBtn">保存</button>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
