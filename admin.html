<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" href="favicon.ico">
    <title>Arley's | 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 1rem;
            min-height: 100vh;
            color: #e8e8e8;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #d99bb8; font-size: 1.5rem; }
        h2 { color: #c9b6d0; margin: 1rem 0 0.8rem; font-size: 1.1rem; }
        
        .logout-btn {
            position: fixed; top: 1rem; right: 1rem;
            background: #2a2a3e; padding: 6px 16px; border-radius: 30px;
            cursor: pointer; border: 1px solid #9b59b6; font-size: 0.85rem;
            z-index: 100;
        }
        .logout-btn:hover { background: #9b59b6; }
        
        .card { background: rgba(30, 30, 46, 0.95); border-radius: 16px; padding: 1rem; margin-bottom: 1.5rem; border: 1px solid #2a2a3e; }
        
        .form-group { margin-bottom: 0.8rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; color: #c9b6d0; font-size: 0.8rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px 14px; border-radius: 30px;
            border: 1px solid #2a2a3e; background: #1a1a2e; color: #e8e8e8;
            font-size: 0.85rem; outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: #9b59b6; }
        .form-row { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 120px; }
        
        .btn {
            padding: 8px 20px; border-radius: 30px; border: none;
            cursor: pointer; background: #2a2a3e; color: #e8e8e8;
            transition: all 0.2s; font-size: 0.85rem;
        }
        .btn-primary { background: #9b59b6; color: white; }
        .btn-primary:hover { background: #8e44ad; transform: translateY(-2px); }
        .btn-danger { background: #c0392b; color: white; }
        .btn-danger:hover { background: #e74c3c; transform: translateY(-2px); }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #2ecc71; transform: translateY(-2px); }
        .btn-sm { padding: 5px 12px; font-size: 0.75rem; }
        
        .message-item {
            background: #1a1a2e; border-radius: 12px; padding: 0.8rem;
            margin-bottom: 0.8rem; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 0.8rem;
        }
        .message-info { flex: 1; }
        .message-nickname { font-weight: bold; color: #d99bb8; }
        .message-time { font-size: 0.65rem; color: #888; margin-left: 0.5rem; }
        .message-content { margin-top: 0.3rem; font-size: 0.85rem; }
        .status-badge {
            font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; margin-left: 0.5rem;
        }
        .status-pending { background: #f39c12; color: #333; }
        .status-approved { background: #27ae60; color: white; }
        
        .bookmark-table, .quicklink-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .bookmark-table th, .bookmark-table td,
        .quicklink-table th, .quicklink-table td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid #2a2a3e;
        }
        .bookmark-table th, .quicklink-table th {
            color: #c9b6d0;
            font-weight: 500;
        }
        .bookmark-table tr:hover, .quicklink-table tr:hover {
            background: rgba(155, 89, 182, 0.1);
        }
        
        .empty { text-align: center; padding: 2rem; color: #888; font-size: 0.85rem; }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 18px;
            background: #2a2a3e;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .tab:hover { background: #3a3a4e; }
        .tab.active { background: #9b59b6; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e; border-radius: 20px; padding: 1.5rem; width: 90%; max-width: 350px;
            border: 1px solid #9b59b6; text-align: center;
        }
        .modal-content h3 { margin-bottom: 1rem; color: #d99bb8; font-size: 1.2rem; }
        .modal-content p { margin-bottom: 1.2rem; }
        .modal-buttons { display: flex; gap: 0.8rem; justify-content: center; }
        
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #27ae60; color: white; padding: 8px 20px;
            border-radius: 40px; font-size: 0.8rem; z-index: 1001;
            animation: fadeOut 2.5s ease forwards;
        }
        .toast-error { background: #c0392b; }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        .category-hint { font-size: 0.65rem; color: #888; margin-top: 0.2rem; }
        
        @media (max-width: 640px) {
            body { padding: 0.8rem; }
            .form-row { flex-direction: column; gap: 0.5rem; }
            .btn { padding: 6px 14px; font-size: 0.75rem; }
            .tab { padding: 6px 14px; font-size: 0.75rem; }
            .bookmark-table th, .bookmark-table td,
            .quicklink-table th, .quicklink-table td { padding: 8px 4px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌸 Arley's | 管理后台</h1>
    
    <div class="tabs">
        <div class="tab active" data-tab="bookmarks">📚 书签管理</div>
        <div class="tab" data-tab="messages">💬 留言管理</div>
        <div class="tab" data-tab="quicklinks">🔗 快捷链接</div>
        <div class="tab" data-tab="settings">⚙️ 网站设置</div>
    </div>
    
    <!-- 书签管理 -->
    <div id="tab-bookmarks" class="tab-content active">
        <div class="card">
            <h2>➕ 添加书签</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>📂 分类</label>
                    <input type="text" id="newCategory" list="categoryList" placeholder="选择或输入新分类">
                    <datalist id="categoryList"></datalist>
                </div>
                <div class="form-group">
                    <label>📖 标题</label>
                    <input type="text" id="newName" placeholder="网站名称">
                </div>
                <div class="form-group">
                    <label>🔗 网址</label>
                    <input type="text" id="newUrl" placeholder="https://">
                </div>
                <div class="form-group">
                    <label>💬 描述</label>
                    <input type="text" id="newDesc" placeholder="简单描述">
                </div>
            </div>
            <button class="btn btn-primary" id="addBookmarkBtn">✨ 添加书签</button>
        </div>
        
        <div class="card">
            <h2>📖 现有书签</h2>
            <div id="bookmarksList"><div class="empty">加载中...</div></div>
        </div>
    </div>
    
    <!-- 留言管理 -->
    <div id="tab-messages" class="tab-content">
        <div class="card">
            <h2>💬 留言审核</h2>
            <div id="messagesList"><div class="empty">加载中...</div></div>
        </div>
    </div>
    
    <!-- 快捷链接管理 -->
    <div id="tab-quicklinks" class="tab-content">
        <div class="card">
            <h2>➕ 添加快捷链接</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>🔗 链接名称</label>
                    <input type="text" id="newQuickLinkName" placeholder="例如：技术博客">
                </div>
                <div class="form-group">
                    <label>🌐 链接地址</label>
                    <input type="text" id="newQuickLinkUrl" placeholder="https://">
                </div>
            </div>
            <button class="btn btn-primary" id="addQuickLinkBtn">✨ 添加快捷链接</button>
        </div>
        
        <div class="card">
            <h2>🔗 现有快捷链接</h2>
            <div id="quickLinksList"><div class="empty">加载中...</div></div>
        </div>
    </div>
    
    <!-- 网站设置 -->
    <div id="tab-settings" class="tab-content">
        <div class="card">
            <h2>⚙️ 基本信息</h2>
            <div class="form-group">
                <label>网站名称</label>
                <input type="text" id="siteName" placeholder="Arley's | 书签导航">
            </div>
            <div class="form-group">
                <label>网站描述</label>
                <input type="text" id="siteDesc" placeholder="自用书签导航站，欢迎使用">
            </div>
            <button class="btn btn-primary" id="saveSiteInfo">💾 保存设置</button>
        </div>
        
        <div class="card">
            <h2>📄 版权设置</h2>
            <div class="form-group">
                <label>版权所有年份</label>
                <input type="text" id="copyrightYear" placeholder="2026">
            </div>
            <div class="form-group">
                <label>版权所有者</label>
                <input type="text" id="copyrightOwner" placeholder="ARLEY">
            </div>
            <div class="form-group">
                <label>所有者网址</label>
                <input type="text" id="copyrightUrl" placeholder="https://arley.cn">
            </div>
            <div class="form-group">
                <label>Powered by 名称</label>
                <input type="text" id="poweredName" placeholder="ArleyBKS">
            </div>
            <div class="form-group">
                <label>Powered by 网址</label>
                <input type="text" id="poweredUrl" placeholder="https://bm.arley.cn/">
            </div>
            <div class="form-group">
                <label>萌ICP备案号</label>
                <input type="text" id="icpNumber" placeholder="20222555">
            </div>
            <button class="btn btn-primary" id="saveCopyrightBtn">💾 保存版权设置</button>
        </div>
    </div>
</div>
<div class="logout-btn" id="logoutBtn">🚪 退出登录</div>

<!-- 确认弹窗 -->
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <h3 id="confirmTitle">确认操作</h3>
        <p id="confirmMessage">确定要执行此操作吗？</p>
        <div class="modal-buttons">
            <button class="btn" id="confirmCancel">取消</button>
            <button class="btn btn-primary" id="confirmOk">确定</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://bookmarksdate.arley.workers.dev";
    let adminPass = localStorage.getItem("adminPass");
    
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast' + (isError ? ' toast-error' : '');
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function showConfirm(title, message, onConfirm) {
        const modal = document.getElementById('confirmModal');
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').textContent = message;
        modal.classList.add('active');
        
        const confirmOk = () => {
            modal.classList.remove('active');
            document.getElementById('confirmOk').removeEventListener('click', confirmOk);
            document.getElementById('confirmCancel').removeEventListener('click', confirmCancel);
            onConfirm();
        };
        const confirmCancel = () => {
            modal.classList.remove('active');
            document.getElementById('confirmOk').removeEventListener('click', confirmOk);
            document.getElementById('confirmCancel').removeEventListener('click', confirmCancel);
        };
        document.getElementById('confirmOk').addEventListener('click', confirmOk);
        document.getElementById('confirmCancel').addEventListener('click', confirmCancel);
    }
    
    // ========== 美观登录弹窗 ==========
    function showLoginModal() {
        let loginModal = document.getElementById('loginModal');
        if (!loginModal) {
            loginModal = document.createElement('div');
            loginModal.id = 'loginModal';
            loginModal.className = 'modal';
            loginModal.innerHTML = `
                <div class="modal-content" style="max-width: 350px;">
                    <h3 style="margin-bottom: 1rem;">🔐 管理员登录</h3>
                    <input type="password" id="loginPasswordInput" placeholder="请输入管理密码" style="width:100%; padding:12px; border-radius:30px; border:1px solid #2a2a3e; background:#1a1a2e; color:#e8e8e8; margin-bottom:1rem; outline:none;">
                    <div id="loginErrorMsg" style="color:#e74c3c; font-size:0.75rem; margin-bottom:0.8rem; display:none;"></div>
                    <div class="modal-buttons" style="display: flex; gap: 0.8rem; justify-content: center;">
                        <button class="btn" id="loginCancelBtn">取消</button>
                        <button class="btn btn-primary" id="loginConfirmBtn">登录</button>
                    </div>
                </div>
            `;
            document.body.appendChild(loginModal);
            
            document.getElementById('loginCancelBtn').onclick = () => {
                loginModal.classList.remove('active');
                // 返回到主页
                window.location.href = "/";
            };
            
            document.getElementById('loginConfirmBtn').onclick = async () => {
                const pwd = document.getElementById('loginPasswordInput').value;
                const errorMsg = document.getElementById('loginErrorMsg');
                const loginBtn = document.getElementById('loginConfirmBtn');
                
                if (!pwd) {
                    errorMsg.textContent = '请输入密码';
                    errorMsg.style.display = 'block';
                    return;
                }
                
                loginBtn.textContent = '登录中...';
                loginBtn.disabled = true;
                errorMsg.style.display = 'none';
                
                try {
                    const res = await fetch(`${API_BASE}/api/login`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: pwd }) 
                    });
                    const result = await res.json();
                    
                    if (result.success) {
                        localStorage.setItem('adminPass', pwd);
                        adminPass = pwd;
                        showToast('✅ 登录成功', false);
                        loginModal.classList.remove('active');
                        loadBookmarks();
                        loadMessages();
                        loadQuickLinks();
                        loadSiteInfo();
                    } else {
                        errorMsg.textContent = '密码错误，请重试';
                        errorMsg.style.display = 'block';
                        loginBtn.textContent = '登录';
                        loginBtn.disabled = false;
                        document.getElementById('loginPasswordInput').value = '';
                        document.getElementById('loginPasswordInput').focus();
                    }
                } catch (err) {
                    errorMsg.textContent = '网络错误，请重试';
                    errorMsg.style.display = 'block';
                    loginBtn.textContent = '登录';
                    loginBtn.disabled = false;
                }
            };
            
            document.getElementById('loginPasswordInput').onkeypress = (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('loginConfirmBtn').click();
                }
            };
        }
        
        const pwdInput = document.getElementById('loginPasswordInput');
        const errorMsg = document.getElementById('loginErrorMsg');
        const loginBtn = document.getElementById('loginConfirmBtn');
        if (pwdInput) pwdInput.value = '';
        if (errorMsg) errorMsg.style.display = 'none';
        if (loginBtn) {
            loginBtn.textContent = '登录';
            loginBtn.disabled = false;
        }
        
        loginModal.classList.add('active');
        setTimeout(() => {
            const input = document.getElementById('loginPasswordInput');
            if (input) input.focus();
        }, 100);
    }
    
    // 如果没有保存的密码，显示登录弹窗
    if (!adminPass) {
        showLoginModal();
    }
    
    const headers = { 'Authorization': `Bearer ${adminPass}`, 'Content-Type': 'application/json' };
    
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
        });
    });
    
    // ========== 书签管理 ==========
    async function loadBookmarks() {
        try {
            const res = await fetch(`${API_BASE}/api/admin/bookmarks`, { headers: { 'Authorization': `Bearer ${adminPass}` } });
            if (res.status === 401) { showToast('登录已过期，请重新登录', true); logout(); return; }
            const result = await res.json();
            if (result.success) {
                renderBookmarks(result.data.bookmarks);
                updateCategoryDatalist(result.data.bookmarks);
            }
        } catch (err) { showToast('加载失败', true); }
    }
    
    function renderBookmarks(bookmarks) {
        const container = document.getElementById('bookmarksList');
        if (!bookmarks || bookmarks.length === 0) {
            container.innerHTML = '<div class="empty">暂无书签</div>';
            return;
        }
        let html = '<table class="bookmark-table"><thead><tr><th>分类</th><th>标题</th><th>网址</th><th>操作</th></tr></thead><tbody>';
        bookmarks.forEach(cat => {
            if (!cat.bookmarks || cat.bookmarks.length === 0) return;
            cat.bookmarks.forEach((bookmark, idx) => {
                html += `<tr><td style="padding: 10px 6px;">${escapeHtml(cat.category)}</td><td style="padding: 10px 6px;"><strong>${escapeHtml(bookmark.name)}</strong>${bookmark.desc ? `<br><small style="color:#888;">${escapeHtml(bookmark.desc)}</small>` : ''}</td><td style="padding: 10px 6px;"><small>${escapeHtml(bookmark.url.substring(0, 45))}${bookmark.url.length > 45 ? '...' : ''}</small></td><td style="padding: 10px 6px;"><button class="btn btn-danger btn-sm" onclick="confirmDeleteBookmark('${escapeHtml(cat.category)}', ${idx})">删除</button></td></tr>`;
            });
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function updateCategoryDatalist(bookmarks) {
        const categories = bookmarks.map(cat => cat.category);
        document.getElementById('categoryList').innerHTML = categories.map(c => `<option value="${escapeHtml(c)}">`).join('');
    }
    
    window.confirmDeleteBookmark = (category, index) => {
        showConfirm('删除书签', '确定要删除这个书签吗？', () => deleteBookmark(category, index));
    };
    
    async function deleteBookmark(category, index) {
        try {
            const res = await fetch(`${API_BASE}/api/admin/bookmarks/${encodeURIComponent(category)}/${index}`, { method: 'DELETE', headers });
            if (res.ok) { showToast('✅ 书签已删除'); loadBookmarks(); }
            else { showToast('删除失败', true); }
        } catch (err) { showToast('删除失败', true); }
    }
    
    document.getElementById('addBookmarkBtn').onclick = async () => {
        const category = document.getElementById('newCategory').value.trim();
        const name = document.getElementById('newName').value.trim();
        let url = document.getElementById('newUrl').value.trim();
        const desc = document.getElementById('newDesc').value.trim();
        
        if (!category || !name || !url) { showToast('请填写完整', true); return; }
        if (!url.startsWith('http')) url = 'https://' + url;
        
        try {
            const res = await fetch(`${API_BASE}/api/admin/bookmarks`, {
                method: 'POST', headers,
                body: JSON.stringify({ category, name, url, desc })
            });
            if (res.ok) {
                showToast('✨ 添加成功');
                document.getElementById('newCategory').value = '';
                document.getElementById('newName').value = '';
                document.getElementById('newUrl').value = '';
                document.getElementById('newDesc').value = '';
                loadBookmarks();
            } else { showToast('添加失败', true); }
        } catch (err) { showToast('添加失败', true); }
    };
    
    // ========== 留言管理 ==========
    async function loadMessages() {
        try {
            const res = await fetch(`${API_BASE}/api/admin/messages`, { headers: { 'Authorization': `Bearer ${adminPass}` } });
            if (res.status === 401) { showToast('登录已过期', true); logout(); return; }
            const result = await res.json();
            if (result.success) renderMessages(result.messages);
        } catch (err) { showToast('加载失败', true); }
    }
    
    function renderMessages(messages) {
        const container = document.getElementById('messagesList');
        if (!messages || messages.length === 0) {
            container.innerHTML = '<div class="empty">暂无留言</div>';
            return;
        }
        let html = '';
        messages.forEach(msg => {
            html += `<div class="message-item"><div class="message-info"><span class="message-nickname">${escapeHtml(msg.nickname)}</span><span class="message-time">${new Date(msg.time).toLocaleString()}</span><span class="status-badge status-${msg.status === 'pending' ? 'pending' : 'approved'}">${msg.status === 'pending' ? '待审核' : '已通过'}</span><div class="message-content">${escapeHtml(msg.content)}</div>${msg.recommendUrl ? `<div style="margin-top:0.3rem;">🔗 <a href="${escapeHtml(msg.recommendUrl)}" target="_blank" style="color:#9b59b6;">${escapeHtml(msg.recommendUrl)}</a></div>` : ''}</div><div><button class="btn btn-success btn-sm" onclick="confirmApprove('${msg.id}')">通过</button> <button class="btn btn-danger btn-sm" onclick="confirmDeleteMessage('${msg.id}')">删除</button></div></div>`;
        });
        container.innerHTML = html;
    }
    
    window.confirmApprove = (id) => {
        showConfirm('审核留言', '确定要通过这条留言吗？', () => approveMessage(id));
    };
    
    window.confirmDeleteMessage = (id) => {
        showConfirm('删除留言', '确定要删除这条留言吗？', () => deleteMessage(id));
    };
    
    async function approveMessage(id) {
        try {
            const res = await fetch(`${API_BASE}/api/admin/messages/${id}`, {
                method: 'PUT', headers, body: JSON.stringify({ action: 'approve' })
            });
            if (res.ok) { showToast('✅ 留言已通过'); loadMessages(); }
            else { showToast('操作失败', true); }
        } catch (err) { showToast('操作失败', true); }
    }
    
    async function deleteMessage(id) {
        try {
            const res = await fetch(`${API_BASE}/api/admin/messages/${id}`, {
                method: 'PUT', headers, body: JSON.stringify({ action: 'delete' })
            });
            if (res.ok) { showToast('🗑️ 留言已删除'); loadMessages(); }
            else { showToast('操作失败', true); }
        } catch (err) { showToast('操作失败', true); }
    }
    
    // ========== 快捷链接管理 ==========
    let quickLinks = [];
    
    async function loadQuickLinks() {
        try {
            const res = await fetch(`${API_BASE}/api/admin/quicklinks`, { headers: { 'Authorization': `Bearer ${adminPass}` } });
            if (res.status === 401) { showToast('登录已过期', true); logout(); return; }
            const result = await res.json();
            if (result.success) {
                quickLinks = result.quickLinks || [];
                renderQuickLinks();
            }
        } catch (err) { showToast('加载失败', true); }
    }
    
    function renderQuickLinks() {
        const container = document.getElementById('quickLinksList');
        if (!quickLinks || quickLinks.length === 0) {
            container.innerHTML = '<div class="empty">暂无快捷链接，请添加</div>';
            return;
        }
        
        let html = '<table class="quicklink-table"><thead><tr><th>链接名称</th><th>链接地址</th><th>操作</th></tr></thead><tbody>';
        for (let i = 0; i < quickLinks.length; i++) {
            const link = quickLinks[i];
            html += `<tr><td style="padding: 10px 6px;"><strong>${escapeHtml(link.name || '')}</strong></td><td style="padding: 10px 6px;"><a href="${escapeHtml(link.url || '#')}" target="_blank" style="color:#9b59b6;">${escapeHtml(link.url || '')}</a></td><td style="padding: 10px 6px;"><button class="btn btn-danger btn-sm" onclick="deleteQuickLink(${i})">删除</button></td></tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    window.deleteQuickLink = function(index) {
        showConfirm('删除链接', '确定要删除这个快捷链接吗？', async () => {
            quickLinks.splice(index, 1);
            await saveQuickLinks();
            renderQuickLinks();
        });
    };
    
    async function saveQuickLinks() {
        try {
            const res = await fetch(`${API_BASE}/api/admin/quicklinks`, {
                method: 'PUT', headers,
                body: JSON.stringify({ quickLinks })
            });
            if (res.ok) { 
                showToast('💾 快捷链接已保存');
                await loadQuickLinks();
            } else { 
                showToast('保存失败', true); 
            }
        } catch (err) { showToast('保存失败', true); }
    }
    
    document.getElementById('addQuickLinkBtn').onclick = async () => {
        const name = document.getElementById('newQuickLinkName').value.trim();
        let url = document.getElementById('newQuickLinkUrl').value.trim();
        
        if (!name) { showToast('请填写链接名称', true); return; }
        if (!url) { showToast('请填写链接地址', true); return; }
        if (!url.startsWith('http') && !url.startsWith('mailto:')) {
            url = 'https://' + url;
        }
        
        quickLinks.push({ name: name, url: url, icon: "🔗" });
        await saveQuickLinks();
        
        document.getElementById('newQuickLinkName').value = '';
        document.getElementById('newQuickLinkUrl').value = '';
    };
    
    // ========== 网站设置 ==========
    async function loadSiteInfo() {
        try {
            const res = await fetch(`${API_BASE}/api/siteinfo`);
            const result = await res.json();
            if (result.success && result.siteInfo) {
                const info = result.siteInfo;
                document.getElementById('siteName').value = info.name || '';
                document.getElementById('siteDesc').value = info.description || '';
                document.getElementById('copyrightYear').value = info.copyrightYear || '2026';
                document.getElementById('copyrightOwner').value = info.copyrightOwner || 'ARLEY';
                document.getElementById('copyrightUrl').value = info.copyrightUrl || 'https://arley.cn';
                document.getElementById('poweredName').value = info.poweredName || 'ArleyBKS';
                document.getElementById('poweredUrl').value = info.poweredUrl || 'https://bm.arley.cn/';
                document.getElementById('icpNumber').value = info.icpNumber || '20222555';
            }
        } catch (err) { console.error(err); }
    }
    
    document.getElementById('saveSiteInfo').onclick = async () => {
        const name = document.getElementById('siteName').value.trim();
        const description = document.getElementById('siteDesc').value.trim();
        if (!name) { showToast('请填写网站名称', true); return; }
        try {
            const res = await fetch(`${API_BASE}/api/admin/siteinfo`, {
                method: 'PUT', headers,
                body: JSON.stringify({ name, description })
            });
            if (res.ok) { showToast('💾 网站信息已保存'); }
            else { showToast('保存失败', true); }
        } catch (err) { showToast('保存失败', true); }
    };
    
    document.getElementById('saveCopyrightBtn').onclick = async () => {
        const copyrightYear = document.getElementById('copyrightYear').value.trim();
        const copyrightOwner = document.getElementById('copyrightOwner').value.trim();
        const copyrightUrl = document.getElementById('copyrightUrl').value.trim();
        const poweredName = document.getElementById('poweredName').value.trim();
        const poweredUrl = document.getElementById('poweredUrl').value.trim();
        const icpNumber = document.getElementById('icpNumber').value.trim();
        
        try {
            const res = await fetch(`${API_BASE}/api/admin/siteinfo`, {
                method: 'PUT', headers,
                body: JSON.stringify({ 
                    copyrightYear, copyrightOwner, copyrightUrl,
                    poweredName, poweredUrl, icpNumber
                })
            });
            if (res.ok) { showToast('💾 版权信息已保存'); }
            else { showToast('保存失败', true); }
        } catch (err) { showToast('保存失败', true); }
    };
    
    function logout() {
        localStorage.removeItem("adminPass");
        adminPass = null;
        showToast('已退出登录', false);
        showLoginModal();
    }
    
    document.getElementById('logoutBtn').onclick = () => {
        showConfirm('退出登录', '确定要退出管理后台吗？', logout);
    };
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // 初始化（如果已有密码才加载数据）
    if (adminPass) {
        loadBookmarks();
        loadMessages();
        loadQuickLinks();
        loadSiteInfo();
    }
</script>
</body>
</html>
