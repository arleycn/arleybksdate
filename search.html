<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Arley">
    <meta name="keywords" content="arley,搜索,引擎,导航"/>
    <meta name="description" content="Arley's | 极简搜索">
    <title>Arley's | 搜索</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" href="/images/bks.png" type="image/x-icon">
    <link rel="apple-touch-icon" href="/images/bks.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/search.css">
</head>
<body>
    <!-- ===== 顶部导航 ===== -->
    <div class="top-nav">
        <a href="/">📚 返回书签</a>
        <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
            <span class="user-display" id="userDisplay">👤 <span id="usernameDisplay"></span></span>
            <button class="top-nav-btn" id="loginBtn">🔐 登录</button>
            <button class="top-nav-btn" id="logoutBtn" style="display:none;">🚪 退出</button>
            <select id="themeSelector">
                <option value="auto">🌈 跟随系统</option>
                <option value="light">☀️ 白天</option>
                <option value="dark">🌙 夜间</option>
            </select>
        </div>
    </div>
    <div class="search-wrapper">
        <div class="search-container">
            <div class="search-datetime">
                <div class="date" id="searchDate">加载中...</div>
                <div class="time" id="searchTime">--:--:--</div>
                <div class="weekday" id="searchWeekday">--</div>
            </div>
            <div class="search-engine-box">
                <select id="engineSelect"></select>
                <input type="text" id="engineSearchInput" placeholder="输入关键词，按 Enter 搜索..." autocomplete="off">
                <button id="engineSearchBtn">搜索</button>
            </div>
            <div class="search-tip">⌨️ 按 Enter 快速搜索 · 点击标签快速访问</div>
        </div>
        <!-- ===== 标签区域 ===== -->
        <div class="quick-tabs-section">
            <div class="quick-tabs-header">
                <h3 id="tabsTitle">📌 默认标签（登录后可自定义）</h3>
                <div class="quick-tabs-actions" id="tabsActions" style="display:none;">
                    <button class="btn-add" id="addTabBtn">+ 添加</button>
                    <button class="btn-reset" id="resetTabsBtn">重置</button>
                </div>
            </div>
            <div class="quick-tabs-grid" id="quickTabsGrid">
                <div style="grid-column:1/-1; text-align:center; padding:1rem; color:var(--text-secondary); opacity:0.5; font-size:0.8rem;">⏳ 加载中...</div>
            </div>
            <div class="network-error-banner" id="networkErrorBanner">⚠️ 网络连接异常，请刷新重试</div>
        </div>
    </div>
    <!-- ===== 底部版权 ===== -->
    <div class="search-footer">
        <div class="footer-bottom" id="copyrightContainer">加载中...</div>
    </div>
    <!-- ===== 📝 添加标签弹窗 ===== -->
    <div id="tabModal" class="modal">
        <div class="modal-content">
            <h3>✨ 添加快捷标签</h3>
            <div class="form-group">
                <label>🌐 网站名称</label>
                <input type="text" id="tabNameInput" placeholder="例如：GitHub" maxlength="20" autocomplete="off">
            </div>
            <div class="form-group">
                <label>🔗 网址</label>
                <input type="text" id="tabUrlInput" placeholder="https://github.com" autocomplete="off">
            </div>
            <div class="form-group">
                <label>🎨 图标（留空自动获取网站 favicon）</label>
                <input type="text" id="tabIconInput" placeholder="例如：🐱 或留空自动获取" maxlength="4" autocomplete="off">
                <div class="favicon-preview" id="faviconPreview">
                    <span class="preview-icon" id="previewIcon">🔗</span>
                    <span>网站图标预览</span>
                    <span class="preview-label" id="previewStatus">输入网址后自动获取</span>
                </div>
                <div class="icon-hint">💡 留空将自动从网站获取 favicon.ico 图标</div>
            </div>
            <div class="modal-loading" id="tabModalLoading">⏳ 提交中...</div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="tabModalCancel">取消</button>
                <button class="btn btn-primary" id="tabModalConfirm">添加</button>
            </div>
        </div>
    </div>
    <!-- ===== 🔐 登录弹窗 ===== -->
    <div id="loginModal" class="modal">
        <div class="modal-content" style="max-width: 360px;">
            <h3>🔐 登录账号</h3>
            <div class="form-group">
                <label>👤 用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label>🔑 密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <div id="loginError" style="color:#e74c3c; font-size:0.7rem; display:none; margin-bottom:0.5rem;"></div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="loginCancelBtn">取消</button>
                <button class="btn btn-primary" id="loginConfirmBtn">登录</button>
            </div>
            <div style="text-align:center; margin-top:0.8rem; font-size:0.7rem; color:var(--text-secondary); opacity:0.6;">
                还没有账号？<a href="#" id="switchToRegister" style="color:var(--btn-primary); cursor:pointer;">去注册</a>
            </div>
        </div>
    </div>
    <!-- ===== 📝 注册弹窗 ===== -->
    <div id="registerModal" class="modal">
        <div class="modal-content" style="max-width: 360px;">
            <h3>📝 注册账号</h3>
            <div class="form-group">
                <label>👤 用户名（2-20个字符）</label>
                <input type="text" id="registerUsername" placeholder="设置用户名" autocomplete="off">
            </div>
            <div class="form-group">
                <label>🔑 密码（至少4个字符）</label>
                <input type="password" id="registerPassword" placeholder="设置密码" autocomplete="new-password">
            </div>
            <div id="registerError" style="color:#e74c3c; font-size:0.7rem; display:none; margin-bottom:0.5rem;"></div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="registerCancelBtn">取消</button>
                <button class="btn btn-primary" id="registerConfirmBtn">注册</button>
            </div>
            <div style="text-align:center; margin-top:0.8rem; font-size:0.7rem; color:var(--text-secondary); opacity:0.6;">
                已有账号？<a href="#" id="switchToLogin" style="color:var(--btn-primary); cursor:pointer;">去登录</a>
            </div>
        </div>
    </div>
        <script src="js/search.js"></script>

    <!-- ❤️ 点赞组件 -->
    <div id="like-placeholder"></div>
    <script>
        fetch('https://like.arley.workers.dev/like-component')
            .then(r => r.text())
            .then(html => {
                document.getElementById('like-placeholder').outerHTML = html;
            });
    </script>
    <script src="js/search.js"></script>
</body>
</html>
