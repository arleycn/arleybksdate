<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Arley's | 搜索</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" href="/images/bks.png" type="image/x-icon">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        /* 重置页面，全屏居中 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --card-bg: rgba(30, 30, 46, 0.75);
            --text-primary: #e8e8e8;
            --text-secondary: #c9b6d0;
            --border-color: #2a2a3e;
            --btn-bg: rgba(30, 30, 46, 0.6);
            --btn-primary: #9b59b6;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }
        .search-container {
            width: 100%;
            max-width: 700px;
            text-align: center;
            padding: 1rem;
        }
        /* 日期时间 */
        .search-datetime {
            margin-bottom: 2.5rem;
        }
        .search-datetime .date {
            font-size: 1.4rem;
            color: var(--text-secondary);
            opacity: 0.7;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .search-datetime .time {
            font-size: 4.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e8809e, #c95c7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
        }
        body.dark .search-datetime .time {
            background: linear-gradient(135deg, #d99bb8, #b86b9e);
            background-clip: text;
            -webkit-background-clip: text;
        }
        .search-datetime .weekday {
            font-size: 1rem;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-top: 0.3rem;
            letter-spacing: 3px;
        }
        /* 搜索框 */
        .search-engine-box {
            width: 100%;
            background: var(--card-bg);
            border-radius: 60px;
            padding: 0.4rem 0.4rem 0.4rem 1.5rem;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 8px 28px -12px var(--shadow-color);
            transition: box-shadow 0.25s;
            margin-bottom: 1.5rem;
        }
        .search-engine-box:focus-within {
            box-shadow: 0 8px 32px -8px var(--shadow-color), 0 0 0 2px rgba(245, 163, 189, 0.25);
        }
        .search-engine-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 6px;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            min-width: 0;
        }
        .search-engine-box input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }
        .search-engine-box button {
            background: var(--btn-primary);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .search-engine-box button:hover {
            filter: brightness(1.08);
            transform: scale(1.02);
        }
        /* 搜索引擎卡片 */
        .search-engines-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.8rem;
            width: 100%;
        }
        .engine-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 0.8rem 0.6rem;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px -6px var(--shadow-color);
        }
        .engine-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: var(--btn-primary);
            box-shadow: 0 12px 24px -12px var(--shadow-color);
        }
        .engine-card .engine-icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 0.2rem;
        }
        .engine-card .engine-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .engine-card .engine-desc {
            font-size: 0.6rem;
            color: var(--text-secondary);
            opacity: 0.6;
            margin-top: 2px;
        }
        /* 返回按钮 */
        .back-link {
            position: fixed;
            top: 1rem;
            left: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
            z-index: 100;
        }
        .back-link:hover {
            background: var(--btn-primary);
            color: white;
        }
        /* 主题切换按钮 */
        .theme-toggle-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
            z-index: 100;
        }
        .theme-toggle-btn:hover {
            background: var(--btn-primary);
            color: white;
        }
        /* 响应式 */
        @media (max-width: 640px) {
            .search-datetime .time { font-size: 3rem; }
            .search-datetime .date { font-size: 1.1rem; }
            .search-engine-box { padding-left: 1rem; }
            .search-engine-box input { font-size: 0.9rem; padding: 12px 4px; }
            .search-engine-box button { padding: 8px 16px; font-size: 0.8rem; }
            .search-engines-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .back-link, .theme-toggle-btn { font-size: 0.7rem; padding: 4px 12px; top: 0.6rem; }
        }
        body.dark .search-engine-box {
            background: var(--card-bg);
            border-color: var(--border-color);
        }
        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #27ae60;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1100;
            animation: fadeOut 2.5s ease forwards;
        }
        .toast-error {
            background: #c0392b;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">📚 返回书签</a>
    <button class="theme-toggle-btn" id="themeToggle">🌙 夜间</button>

    <div class="search-container">
        <!-- 日期时间 -->
        <div class="search-datetime">
            <div class="date" id="searchDate">加载中...</div>
            <div class="time" id="searchTime">--:--:--</div>
            <div class="weekday" id="searchWeekday">--</div>
        </div>

        <!-- 搜索框 -->
        <div class="search-engine-box">
            <input type="text" id="engineSearchInput" placeholder="输入关键词，按 Enter 搜索..." autocomplete="off">
            <button id="engineSearchBtn">搜索</button>
        </div>

        <!-- 搜索引擎卡片 -->
        <div class="search-engines-grid" id="engineGrid"></div>
    </div>

    <script>
        // ===== 搜索引擎配置 =====
        const SEARCH_ENGINES = [
            { name: '百度', icon: '🌐', url: 'https://www.baidu.com/s?wd=', desc: '综合搜索' },
            { name: 'Google', icon: '🌍', url: 'https://www.google.com/search?q=', desc: '全球引擎' },
            { name: 'Bing', icon: '🔵', url: 'https://www.bing.com/search?q=', desc: '微软必应' },
            { name: '搜狗', icon: '🐶', url: 'https://www.sogou.com/web?query=', desc: '中文搜索' },
            { name: '360', icon: '🛡️', url: 'https://www.so.com/s?q=', desc: '安全搜索' },
            { name: 'DuckDuckGo', icon: '🦆', url: 'https://duckduckgo.com/?q=', desc: '隐私保护' },
            { name: 'Yandex', icon: '🌟', url: 'https://yandex.com/search/?text=', desc: '俄式引擎' },
            { name: '头条搜索', icon: '📰', url: 'https://m.toutiao.com/search/?keyword=', desc: '资讯聚合' }
        ];

        // ===== 主题切换 =====
        function initTheme() {
            const saved = localStorage.getItem("theme");
            if (saved === "dark") {
                document.body.classList.add("dark");
                document.getElementById("themeToggle").textContent = "☀️ 白天";
            }
        }
        document.getElementById("themeToggle").addEventListener("click", () => {
            document.body.classList.toggle("dark");
            const isDark = document.body.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            document.getElementById("themeToggle").textContent = isDark ? "☀️ 白天" : "🌙 夜间";
        });
        initTheme();

        // ===== 日期时间 =====
        function updateDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            
            document.getElementById('searchDate').textContent = `${year}年${month}月${day}日`;
            document.getElementById('searchTime').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('searchWeekday').textContent = weekdays[now.getDay()];
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // ===== 渲染搜索引擎卡片 =====
        function renderEngines() {
            const grid = document.getElementById('engineGrid');
            grid.innerHTML = SEARCH_ENGINES.map(engine => `
                <div class="engine-card" data-engine='${JSON.stringify(engine).replace(/'/g,"&#39;")}'>
                    <span class="engine-icon">${engine.icon}</span>
                    <div class="engine-name">${engine.name}</div>
                    <div class="engine-desc">${engine.desc}</div>
                </div>
            `).join('');

            grid.querySelectorAll('.engine-card').forEach(card => {
                card.addEventListener('click', function() {
                    const engine = JSON.parse(this.dataset.engine);
                    const input = document.getElementById('engineSearchInput');
                    const keyword = input.value.trim();
                    if (!keyword) {
                        input.value = engine.name + ' ';
                        input.focus();
                        return;
                    }
                    window.open(engine.url + encodeURIComponent(keyword), '_blank');
                });
            });
        }
        renderEngines();

        // ===== 搜索逻辑（默认 Bing，索引2） =====
        function performSearch() {
            const input = document.getElementById('engineSearchInput');
            const keyword = input.value.trim();
            if (!keyword) {
                const toast = document.createElement('div');
                toast.className = 'toast toast-error';
                toast.textContent = '请输入关键词';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
                return;
            }
            const defaultEngine = SEARCH_ENGINES[2]; // Bing
            window.open(defaultEngine.url + encodeURIComponent(keyword), '_blank');
        }

        document.getElementById('engineSearchBtn').addEventListener('click', performSearch);
        document.getElementById('engineSearchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // 自动聚焦
        document.getElementById('engineSearchInput').focus();
    </script>
</body>
</html>
