<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Arley">
    <meta name="keywords" content="arley,搜索,引擎,导航"/>
    <meta name="description" content="Arley's | 极简搜索">
    <title>Arley's | 搜索</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" href="/images/bks.png" type="image/x-icon">
    <link rel="apple-touch-icon" href="/images/bks.png">
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* ===== 重置页面，全屏居中 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 1rem;
            position: relative;
        }
        /* 背景图片（与主站一致） */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../images/bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.35;
            z-index: -2;
            pointer-events: none;
        }
        body.dark::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            body::before {
                background-image: url('../images/bgmobile.jpg');
                opacity: 0.4;
            }
        }

        /* ===== 主容器 ===== */
        .search-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
            z-index: 1;
        }
        .search-container {
            width: 100%;
            max-width: 700px;
            text-align: center;
            padding: 1rem 0;
        }

        /* ===== 日期时间 ===== */
        .search-datetime {
            margin-bottom: 2.5rem;
        }
        .search-datetime .date {
            font-size: 1.4rem;
            color: var(--text-secondary);
            opacity: 0.7;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .search-datetime .time {
            font-size: 4.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e8809e, #c95c7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
        }
        body.dark .search-datetime .time {
            background: linear-gradient(135deg, #d99bb8, #b86b9e);
            background-clip: text;
            -webkit-background-clip: text;
        }
        .search-datetime .weekday {
            font-size: 1rem;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-top: 0.3rem;
            letter-spacing: 3px;
        }

        /* ===== 搜索框 ===== */
        .search-engine-box {
            width: 100%;
            background: var(--card-bg);
            border-radius: 60px;
            padding: 0.4rem 0.4rem 0.4rem 1.5rem;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 8px 28px -12px var(--shadow-color);
            transition: box-shadow 0.25s;
            margin-bottom: 1.5rem;
        }
        .search-engine-box:focus-within {
            box-shadow: 0 8px 32px -8px var(--shadow-color), 0 0 0 2px rgba(245, 163, 189, 0.25);
        }
        .search-engine-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 6px;
            font-size: 1rem;
            color: var(--text-primary) !important;
            outline: none;
            min-width: 0;
        }
        .search-engine-box input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }
        .search-engine-box input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px var(--card-bg) inset !important;
            -webkit-text-fill-color: var(--text-primary) !important;
        }
        .search-engine-box button {
            background: var(--btn-primary);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .search-engine-box button:hover {
            filter: brightness(1.08);
            transform: scale(1.02);
        }

        /* ===== 搜索引擎卡片 ===== */
        .search-engines-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.8rem;
            width: 100%;
        }
        .engine-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 0.8rem 0.6rem;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px -6px var(--shadow-color);
        }
        .engine-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: var(--btn-primary);
            box-shadow: 0 12px 24px -12px var(--shadow-color);
        }
        .engine-card .engine-icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 0.2rem;
        }
        .engine-card .engine-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .engine-card .engine-desc {
            font-size: 0.6rem;
            color: var(--text-secondary);
            opacity: 0.6;
            margin-top: 2px;
        }

        /* ===== 顶部导航 ===== */
        .top-nav {
            position: fixed;
            top: 1rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 1rem;
            z-index: 100;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .top-nav a,
        .top-nav select {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
            cursor: pointer;
            font-family: inherit;
        }
        .top-nav a:hover,
        .top-nav select:hover {
            background: var(--btn-primary);
            color: white;
        }
        .top-nav select option {
            background: var(--card-bg);
            color: var(--text-primary);
        }

        /* ===== Footer（仅置底，无关于本站） ===== */
        .search-footer {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }
        .search-footer .footer {
            margin-top: 0;
            background: var(--footer-bg);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            backdrop-filter: blur(12px);
        }
        .search-footer .footer-content {
            padding: 0.8rem 1rem;
        }
        .search-footer .footer-bottom {
            padding: 0.6rem 1rem;
            text-align: center;
            font-size: 0.6rem;
            color: var(--text-secondary);
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .search-datetime .time { font-size: 3rem; }
            .search-datetime .date { font-size: 1.1rem; }
            .search-engine-box { padding-left: 1rem; }
            .search-engine-box input { font-size: 0.9rem; padding: 12px 4px; }
            .search-engine-box button { padding: 8px 16px; font-size: 0.8rem; }
            .search-engines-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .top-nav a, .top-nav select { font-size: 0.7rem; padding: 4px 12px; }
            .search-footer .footer-content { padding: 0.6rem 0.8rem; }
        }

        /* ===== Toast 提示 ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #27ae60;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1100;
            animation: fadeOut 2.5s ease forwards;
        }
        .toast-error {
            background: #c0392b;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <!-- ===== 顶部导航 ===== -->
    <div class="top-nav">
        <a href="/">📚 返回书签</a>
        <select id="themeSelector" style="background:var(--card-bg);border:1px solid var(--border-color);padding:6px 16px;border-radius:30px;color:var(--text-secondary);font-size:0.8rem;cursor:pointer;backdrop-filter:blur(8px);font-family:inherit;">
            <option value="auto">🌈 跟随系统</option>
            <option value="light">☀️ 白天</option>
            <option value="dark">🌙 夜间</option>
        </select>
    </div>

    <!-- ===== 主内容 ===== -->
    <div class="search-wrapper">
        <div class="search-container">
            <!-- 日期时间 -->
            <div class="search-datetime">
                <div class="date" id="searchDate">加载中...</div>
                <div class="time" id="searchTime">--:--:--</div>
                <div class="weekday" id="searchWeekday">--</div>
            </div>

            <!-- 搜索框 -->
            <div class="search-engine-box">
                <input type="text" id="engineSearchInput" placeholder="输入关键词，按 Enter 搜索..." autocomplete="off">
                <button id="engineSearchBtn">🔍 搜索</button>
            </div>

            <!-- 搜索引擎卡片 -->
            <div class="search-engines-grid" id="engineGrid"></div>
        </div>
    </div>

    <!-- ===== Footer（仅置底，无关于本站） ===== -->
    <div class="search-footer">
        <div class="footer">
            <div class="footer-content">
                <div class="footer-bottom" id="copyrightContainer">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // ===== 搜索引擎配置 =====
        const SEARCH_ENGINES = [
            { name: '百度', icon: '🌐', url: 'https://www.baidu.com/s?wd=', desc: '综合搜索' },
            { name: 'Google', icon: '🌍', url: 'https://www.google.com/search?q=', desc: '全球引擎' },
            { name: 'Bing', icon: '🔵', url: 'https://www.bing.com/search?q=', desc: '微软必应' },
            { name: '搜狗', icon: '🐶', url: 'https://www.sogou.com/web?query=', desc: '中文搜索' },
            { name: '360', icon: '🛡️', url: 'https://www.so.com/s?q=', desc: '安全搜索' },
            { name: 'DuckDuckGo', icon: '🦆', url: 'https://duckduckgo.com/?q=', desc: '隐私保护' },
            { name: 'Yandex', icon: '🌟', url: 'https://yandex.com/search/?text=', desc: '俄式引擎' },
            { name: '头条搜索', icon: '📰', url: 'https://m.toutiao.com/search/?keyword=', desc: '资讯聚合' }
        ];

        // ===== 主题切换 =====
        function setTheme(theme) {
            const isDark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.body.classList.toggle('dark', isDark);
            localStorage.setItem('theme', theme);
            document.getElementById('themeSelector').value = theme;
        }

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'auto';
            setTheme(saved);
        }

        document.getElementById('themeSelector').addEventListener('change', function() {
            setTheme(this.value);
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (localStorage.getItem('theme') === 'auto') {
                setTheme('auto');
            }
        });

        initTheme();

        // ===== 日期时间 =====
        function updateDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            
            document.getElementById('searchDate').textContent = `${year}年${month}月${day}日`;
            document.getElementById('searchTime').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('searchWeekday').textContent = weekdays[now.getDay()];
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // ===== 渲染搜索引擎卡片 =====
        function renderEngines() {
            const grid = document.getElementById('engineGrid');
            grid.innerHTML = SEARCH_ENGINES.map(engine => `
                <div class="engine-card" data-engine='${JSON.stringify(engine).replace(/'/g,"&#39;")}'>
                    <span class="engine-icon">${engine.icon}</span>
                    <div class="engine-name">${engine.name}</div>
                    <div class="engine-desc">${engine.desc}</div>
                </div>
            `).join('');

            grid.querySelectorAll('.engine-card').forEach(card => {
                card.addEventListener('click', function() {
                    const engine = JSON.parse(this.dataset.engine);
                    const input = document.getElementById('engineSearchInput');
                    const keyword = input.value.trim();
                    if (!keyword) {
                        input.value = engine.name + ' ';
                        input.focus();
                        return;
                    }
                    window.open(engine.url + encodeURIComponent(keyword), '_blank');
                });
            });
        }
        renderEngines();

        // ===== 搜索逻辑（默认 Bing） =====
        function performSearch() {
            const input = document.getElementById('engineSearchInput');
            const keyword = input.value.trim();
            if (!keyword) {
                const toast = document.createElement('div');
                toast.className = 'toast toast-error';
                toast.textContent = '请输入关键词';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
                return;
            }
            const defaultEngine = SEARCH_ENGINES[2];
            window.open(defaultEngine.url + encodeURIComponent(keyword), '_blank');
        }

        document.getElementById('engineSearchBtn').addEventListener('click', performSearch);
        document.getElementById('engineSearchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        document.getElementById('engineSearchInput').focus();

        // ===== 加载版权信息 =====
        async function fetchCopyright() {
            try {
                const res = await fetch('/api/siteinfo');
                const result = await res.json();
                const currentYear = new Date().getFullYear();
                const container = document.getElementById('copyrightContainer');
                if (result.success && result.siteInfo) {
                    const info = result.siteInfo;
                    const name = info.name || "Arley's | 书签导航";
                    const desc = info.description || "自用书签导航站，欢迎使用";
                    const year = info.copyrightYear || currentYear;
                    const owner = info.copyrightOwner || '';
                    const ownerUrl = info.copyrightUrl || '';
                    const poweredName = info.poweredName || '';
                    const poweredUrl = info.poweredUrl || '';
                    const icpNumber = info.icpNumber || '';
                    let html = '';
                    if (owner) {
                        html += `COPYRIGHT © ${year} `;
                        if (ownerUrl) html += `<a href="${ownerUrl}" target="_blank" style="color: var(--btn-primary); text-decoration: none;"><strong>${owner}</strong></a> `;
                        else html += `<strong>${owner}</strong> `;
                    }
                    if (poweredName) {
                        if (html) html += `| `;
                        html += `POWERED BY `;
                        if (poweredUrl) html += `<a href="${poweredUrl}" target="_blank" style="color: var(--btn-primary); text-decoration: none;"><strong>${poweredName}</strong></a> `;
                        else html += `<strong>${poweredName}</strong> `;
                    }
                    if (icpNumber) {
                        if (html) html += `| `;
                        html += `萌ICP备 <a href="https://icp.gov.moe/?keyword=${icpNumber}" target="_blank" rel="noopener" style="color: var(--btn-primary); text-decoration: none;"><strong>${icpNumber}</strong>号</a>`;
                    }
                    container.innerHTML = html || `${currentYear} ${name} · ${desc}`;
                } else {
                    container.innerHTML = `${currentYear} Arley's | 书签导航 · 自用书签导航站，欢迎使用`;
                }
            } catch (err) {
                const currentYear = new Date().getFullYear();
                document.getElementById('copyrightContainer').innerHTML = `${currentYear} Arley's | 书签导航 · 自用书签导航站，欢迎使用`;
            }
        }
        fetchCopyright();
    </script>
</body>
</html>
